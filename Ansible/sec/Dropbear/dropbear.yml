---

- set_fact:
    stig_id: upgrade Ubuntu 16 or Ubuntu18 Dropbear kernel to 2017.75.build1
    stig_text: "FAILED. Ubuntu failed to install new Dropbear."
    file_src: /home/thuan/projects/Dropbear/Ubuntu-18
    remote_path: /usr/local/Dropbear
 
- local_action: lineinfile regexp='^install-dropbear-2017.75' path="{{ output_path }}" state=absent

- name: Check if Dropbear 2017.75 or newer is installed.
  block:      
  
    - name: validating if Ubuntu has Dropbear 2017.75 or newer is installed.
      shell: dpkg -l | grep -i 'dropbear-bin' | awk '{print $3}' | cut -d'-' -f1
      register: ver_check
      failed_when: ver_check.stdout is version('2017.75', '<')
           
    - set_fact:
        stig_text: "PASSED"
        
  rescue:

    - name: Download Dropbear packages from local machine to remote host.
      become: true
      copy:
        src: "{{ file_src }}"
        dest: "{{ remote_path }}"
        owner: root
        group: root
        mode: 0755
      register: downloads

    - name: Make Dropbear packages executable 
      become: true
      file:
        path: "{{ remote_path }}"
        state: directory
        mode: 0755
        recurse: yes
      register: permissions
      when: downloads.changed

    - name: check if dropbear file is exist.
      stat: 
        path: /usr/sbin/dropbear
      register: file_check
   
    - name: Uninstall old Dropbear
      become: true
      file:
        path: /usr/sbin/dropbear
        state: absent
      when: file_check.stat.exists == true
      register: uninstall

    - name: Install packages
      become: true
      shell: dpkg -i *.deb
      args:
        chdir: "{{ remote_path }}/Ubuntu-18"
      register: installation

    - set_fact:
        stig_text: "PASSED"
      when: installation.changed

    - name: remove Linux Kernel download folder after installation is done.
      file:
        path: "{{ remote_path }}"
        state: absent
      when: installation.changed
       
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes




