---

- set_fact:
    stig_id: V-214243
    stig_text: "The Apache web server doesn't have resource mappings set to disable the serving of certain file types."
    target_file: /etc/apache2/apache2.conf

- local_action: lineinfile regexp='^V-214243' path="{{ output_path }}" state=absent

- name: Check for any "Action" or "AddHanler" directives
  block: 

    - name: Checking for any directives
      shell: grep -iE 'action|handler' {{ target_file }}
      register: directives
      failed_when: directives.rc == 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: Remove "Action" directive
      become: true
      lineinfile:
        path: "{{ target_file }}"
        state: absent
        regexp: '^(.*)Action(.*)$'
        backrefs: yes
      register: remove_action

    - name: Remove "AddHandler" directive
      become: true
      lineinfile:
        path: "{{ target_file }}"
        state: absent
        regexp: '^(.*)AddHandler(.*)$'
        backrefs: yes
      register: remove_addhandler      

    - name: restart apache2
      service:
        name: httpd
        enabled: true
        state: restarted
      register: restart
            
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: 
        - remove_action.changed
        - remove_addhandler.changed

    - debug:
        var: stig_text

  always:
    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
