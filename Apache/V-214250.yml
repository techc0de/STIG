---

- set_fact:
    stig_id: V-214250
    stig_text: "The Apache web server must invalidate session identifiers upon hosted application user logout or other session termination."
    target_file: /etc/apache2/conf-available/extra-stigs.conf

- local_action: lineinfile regexp='^V-214250' path="{{ output_path }}" state=absent

- name: Search for the directive
  block: 

    - name: Checking for "SessionMaxAge" directive
      shell:  grep -i 'SessionMaxAge 600' {{ target_file }}
      register: log
      failed_when: log.rc != 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: add SessionMaxAge directive to file
      become: true
      lineinfile:
        path: "{{ target_file }}"
        state: present
        regexp: '^(.*)SessionMaxAge(.*)$'
        line: SessionMaxAge 600
      register: add_session_max_age

    - name: restart apache2
      shell: apachectl restart
      ignore_errors: yes
      register: restart
            
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: add_session_max_age.changed

    - debug:
        var: stig_text

  always:
    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
