---

- set_fact:
    stig_id: V-214269
    stig_text: "The Apache web server doesn't remove all export ciphers to protect the confidentiality and integrity of transmitted information."
    target_file: /etc/apache2/mods-available/ssl.conf

- local_action: lineinfile regexp='^V-214269' path="{{ output_path }}" state=absent

- name: Search for the directives
  block: 

    - name: Checking for directive
      shell: egrep -i 'SSLCipherSuite.*(EXPORT|EXP)' "{{ target_file }}"
      register: directives
      failed_when: directives.rc != 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: Add EXP option to SSLCipherSuite directive
      become: true
      lineinfile:
        path: "{{ target_file }}"
        state: present
        regexp: 'SSLCipherSuite(.*)$'
        line: 'SSLCipherSuite HIGH:MEDIUM:!MD5!EXP:!NULL:!LOW:!ADH'
      register: session
            
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: session.changed

    - debug:
        var: stig_text

  always:
    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
