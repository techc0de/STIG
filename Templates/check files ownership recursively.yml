---

- set_fact:
    stig_id: V-214235
    stig_text: 'FAILED. The Apache web server log files must only be accessible by privileged users.'
    target_file: /var/log/apache2/

- local_action: lineinfile regexp='^V-214235' path="{{ output_path }}" state=absent

- name: verify that the logs ownership/perms are belong to system administrators and service accounts.
  block: 

    - find: 
        paths: "{{ target_file }}"
        patterns: "*.log"
      register: ownership
      failed_when: ownership.files | selectattr('pw_name', '!=', 'root')

    - find: 
        paths: "{{ target_file }}"
        patterns: "*.log"
      register: group
      failed_when: group.files | selectattr('gr_name', '!=', 'adm')

    - find: 
        paths: "{{ target_file }}"
        patterns: "*.log"
      register: permissions
      failed_when: permissions.files | selectattr('mode', '!=', '0750')

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the permission and ownership of the files
      become: true
      file:
        path: "{{ item.path }}"
        owner: root
        group: adm
        mode: 0750
        with_items: "{{ ownership.files }}"
      register: change_perms

    - set_fact:
        stig_text: "PASSED"
      when: change_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes