---

- set_fact:
    stig_id: V-238235
    stig_text: "FAILED. Ubuntu doesn't automatically lock user account after three invalid logon attempts."
    target_file: /etc/pam.d/common-auth

- local_action: lineinfile regexp='^V-238235' path="{{ output_path }}" state=absent

- name: Check for common-auth file existence
  block: 

    - name: check for file existence
      shell: grep '^auth.*pam_tally' "{{ target_file }}"
      register: pam_check
      failed_when: pam_check.rc == 2 or pam_check == 3

    - assert:
        that: 
          - pam_check.stdout.find('#') == -1
          - pam_check.stdout.find('onerr=fail') != -1
          - pam_check.stdout.find('deny=3') != -1
        fail_msg: Common-auth file Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: enable pam_tally module
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-auth
        type: auth
        control: '[success=1 default=ignore]'
        module_path: 'pam_unix.so'
        module_arguments: 'nullok_secure'
        new_type: auth
        new_control: required
        new_module_path: pam_tally2.so
        module_arguments: 'onerr=fail deny=3'
        state: before
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - name: enable pam_tally reset
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-account
        type: account
        control: 'required'
        module_path: pam_permit.so
        new_type: account
        new_control: required
        new_module_path: pam_tally2.so
        state: before

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

