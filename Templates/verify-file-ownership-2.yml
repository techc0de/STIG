---

- set_fact:
    stig_id: V-75643
    stig_text: 'FAILED. the audit log directory is not owned by "root"'
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-75643' path="{{ output_path }}" state=absent

- name: verify the audit log directory is owned by "root" to prevent unauthorized read access.
  block:

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: audit_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: audit_file.stat.exists == False

    - name: determine log path
      become: true
      shell: grep -iw log_file "{{ target_file }}"
      register: path_param
      failed_when: path_param.stdout == ""

    - assert:
        that: 
          - path_param.stdout.find('#') == -1

    - set_fact:
        log_path: "{{ path_param.stdout.split('=')[1]|trim }}"

    - name: check directory ownership 
      become: true
      shell: ls -lad "{{ log_path | dirname }}" | cut -d' ' -f3
      register: dir_owner
      failed_when: dir_owner.stdout != "root"

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: create audit log directory
      become: true
      file:
        path: "{{ log_path | dirname }}"
        owner: root
        group: root
        state: directory
      register: create_dir
      when: log_path is defined

    - set_fact:
        stig_text: "PASSED"
      when: log_path is defined and create_dir.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
