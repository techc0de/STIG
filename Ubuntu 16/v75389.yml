---

- set_fact:
    stig_id: V-75389
    stig_text: "FAILED. {{ansible_distribution_version}} is not approved for use."

- local_action: lineinfile regexp='^V-75389' path="{{ output_path }}" state=absent

- name: verify the version of the OS is vendor supported
  block:

    - command: /bin/false
      when: ansible_distribution_version not in ["16.04", "18.04"]
      
    - set_fact:
        stig_text: "PASSED"

  rescue:
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

- local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes