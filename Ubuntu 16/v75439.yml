---

- set_fact:
    stig_id: V-75439

- local_action: lineinfile regexp='^V-75439' path="{{ output_path }}" state=absent

- name: update apt cache and install vlock
  become: true
  apt:
    name: vlock
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: check banner message config
  block: 

    - shell: "dpkg -l | grep vlock"
      register: vlock_check

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. vlock package not found"
      when: vlock_check.stdout.find('ii  vlock') == -1

    - command: /bin/false
      when: vlock_check.stdout.find('ii  vlock') == -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes