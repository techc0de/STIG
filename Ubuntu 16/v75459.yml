---

- set_fact:
    stig_id: V-75459

- local_action: lineinfile regexp='^V-75459' path="{{ output_path }}" state=absent

- stat:
    path: /etc/login.defs
  register: login_file

- name: check that password encryption is FIPS 140-2 complient
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pw encryption file does not exist."
      when: login_file.stat.exists == False

    - command: /bin/false
      when: login_file.stat.exists == False

    - shell: grep -i 'crypt' /etc/login.defs
      register: encryption_check

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pw encryption method is not FIPS 140-2 complient."
      when: encryption_check.stdout.find('SHA512') == -1

    - command: /bin/false
      when: encryption_check.stdout.find('SHA512') == -1
      
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: Configure password encryption method
      become: true
      lineinfile:
        path: /etc/login.defs
        create: yes
        owner: root
        group: root
        state: present
        regexp: '^\#*\s*ENCRYPT\_METHOD.*'
        line: ENCRYPT_METHOD SHA512
      register: encryption_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: encryption_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
