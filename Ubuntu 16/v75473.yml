---

- set_fact:
    stig_id: V-75473

- local_action: lineinfile regexp='^V-75473' path="{{ output_path }}" state=absent

- stat:
    path: /etc/login.defs
  register: login_file

- name: check that password max days set to a value equal to or less than 60 days
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pw policy definition file does not exist."
      when: login_file.stat.exists == False

    - command: /bin/false
      when: login_file.stat.exists == False

    - shell: 'grep -i "^pass_max_days\s*[0-9]" /etc/login.defs'
      register: max_check
      failed_when: max_check.rc == 2 or max_check.rc == 3

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. PASS_MAX_DAYS parameter is not set in th /etc/login.defs file."
      when: max_check.rc == 1

    - command: /bin/false
      when: max_check.rc == 1

    - name: update PASS_MAX_DAYS param in /etc/login.defs
      become: true
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS'
        line: "PASS_MAX_DAYS\t60"
      register: max_updated
      when: max_check.stdout | regex_search('([0-9]+$)') | default('0') | int < 60

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. PASS_MAX_DAYS parameter is not set in th /etc/login.defs file."
      when: max_updated.failed is defined and max_updated.failed == true
      
    - command: /bin/false
      when: max_updated.failed is defined and max_updated.failed == true

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: add PASS_MAX_DAYS param in /etc/login.defs
      become: true
      lineinfile:
        path: /etc/login.defs
        line: "PASS_MAX_DAYS\t60"
      register: max_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: max_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
