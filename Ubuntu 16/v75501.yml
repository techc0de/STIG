---

- set_fact:
    stig_id: V-75501

- local_action: lineinfile regexp='^V-75501' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. system has shosts.equiv files"

- name: verify there are no "shosts.equiv" files on the os
  block: 

    - name: search for any shosts.equiv files
      become: true
      shell: >
        locate shosts.equiv | 
        xargs -n 1 -I {} bash -c "if [ -f {} ]; then echo {}; fi"
      register: bad_files

    - command: /bin/false
      when: bad_files.stdout_lines | length > 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: remove any found "shosts.equiv" file from the os
      become: true
      file:
        path: "{{ item }}"
        state: absent
      with_items: "{{ bad_files.stdout_lines }}"
      register: remove_bad_files

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: remove_bad_files.changed == true

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
