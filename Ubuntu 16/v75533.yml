---

- set_fact:
    stig_id: V-75533

- local_action: lineinfile regexp='^V-75533' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. OS is configured to allow the automounting of devices."

- name: verify that the OS disables the ability to automount devices.
  block: 

    - shell: systemctl status autofs
      register: autofs_service
      failed_when: autofs_service.rc == 1

    - name: check if running
      command: /bin/false
      when: autofs_service.stdout.find('running') != -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: configure the OS to disable the ability to automount devices
      become: true
      shell: systemctl stop autofs
      register: autofs_stop

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: autofs_stop.rc == 0

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes