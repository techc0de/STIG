---

- set_fact:
    stig_id: V-75557
    stig_text: "FAILED. found files without a valid group"

- local_action: lineinfile regexp='^V-75557' path="{{ output_path }}" state=absent

- name: verify all files and directories on the os have a valid group.
  block: 

    - name: check the group of all files and directories
      become: true
      shell: >
        find / -nogroup 
        ! -path "/sys/*" 
        ! -path "/proc/*" 
        ! -path "/media/*" 
        ! -path "/var/lib/docker/*" 
        ! -path "/var/lib/lxd/*" 
        ! -path "/var/lib/lxcfs/*" 
        2>/dev/null 
      register: unowned
      failed_when: unowned.rc == 2 or unowned.rc == 3

    - command: /bin/false
      when: unowned.stdout_lines | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: assign a valid group to the unowned files and directories.
      become: true
      file:
        path: "{{ item }}"
        state: touch
        group: root
      with_items: "{{ unowned.stdout_lines }}"
      register: pwned

    - set_fact:
        stig_text: "PASSED"
      when: pwned.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes