---

- set_fact:
    stig_id: V-75559
    stig_text: "FAILED. found users without a home directory assigned"
    bad_users: []

- local_action: lineinfile regexp='^V-75559' path="{{ output_path }}" state=absent

- name: verfiy local interactive users onthe os have a home directory assigned.
  block: 

    - name: get list containing any user without a home directory
      become: true
      shell: > 
        pwck -r | cut -d "'" -f2 2>/dev/null 
      register: no_dir
      failed_when: no_dir.rc == 2 or no_dir.rc == 3

    - name: get list of interative users
      become: true
      shell: > 
        cut -d: -f 1,3 /etc/passwd | egrep ":[0-9]{4,}$" | cut -d ':' -f 1 2>/dev/null
      register: real_users
      failed_when: real_users.rc == 2 or real_users.rc ==3

    - set_fact:
        bad_users: "{{ bad_users + [ item ] }}"
      with_items: "{{ real_users.stdout_lines }}"
      when: "item in no_dir.stdout_lines and item != 'nobody'"

    - command: /bin/false
      when: bad_users | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - set_fact: 
        stig_text: "{{ stig_text }}: {{ bad_users|join(', ') }}"

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes