---

- set_fact:
    stig_id: V-75583
    stig_text: 'FAILED. found world-writable directories are group-owned by root, sys, bin, or an application group.'

- local_action: lineinfile regexp='^V-75583' path="{{ output_path }}" state=absent

- name: verify all world-writable directories are group-owned by root, sys, bin, or an application group
  block: 

    - name: check the system for world-writable directories 
      become: true
      shell: find / -type d \( -group sys -o -group root -o -group bin \) -prune -perm -2
      register: lib_files
      failed_when: lib_files.rc != 0 or lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the group of the world-writable directories to root.
      become: true
      file:
        path: "{{ item }}"
        group: root
        state: directory
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
