---

- set_fact:
    stig_id: V-75585
    stig_text: 'FAILED. kernel core dumps are enabled.'

- local_action: lineinfile regexp='^V-75585' path="{{ output_path }}" state=absent

- name: verify that kernel core dumps are disabled unless needed.
  block:

    - name: check if the package is installed
      shell: dpkg -l linux-crashdump
      register: kdump_package
      failed_when: kdump_package.stdout.find('ii  linux-crashdump') != -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove the linux-crashdump package
      become: true
      apt:
        name: linux-crashdump
        state: absent
      register: remove_package

    - set_fact:
        stig_text: "PASSED"
      when: remove_package.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
