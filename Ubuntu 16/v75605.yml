---

- set_fact:
    stig_id: V-75605
    stig_text: 'FAILED. found system-wide shared library files with invalid mode.'

- local_action: lineinfile regexp='^V-75605' path="{{ output_path }}" state=absent

- name: verify the system-wide shared library files contained in the following directories have mode "0755" or less permissive.
  block: 

    - name: find libary file not owned by root
      become: true
      shell: find /lib /lib64 /usr/lib -perm /022 -type f
      register: lib_files
      failed_when: lib_files.rc != 0 or lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the library files to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        mode: 0755
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
