---

- set_fact:
    stig_id: V-75611
    stig_text: 'FAILED. found system commands that have insecure access permissions'

- local_action: lineinfile regexp='^V-75611' path="{{ output_path }}" state=absent

- name: verify the system commands have mode "0755" or less permissive
  block: 

    - name: check that the system command files have mode "0755" or less permissive
      become: true
      shell: >
        find -L 
        /bin 
        /sbin 
        /usr/bin 
        /usr/sbin 
        /usr/local/bin 
        /usr/local/sbin 
        -perm /022 2>1
      register: lib_files
      failed_when: lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the system commands to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        mode: 0755
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
