---

- set_fact:
    stig_id: V-75615
    stig_text: 'FAILED. found system command files not group-owned by "root"'

- local_action: lineinfile regexp='^V-75615' path="{{ output_path }}" state=absent

- name: verify the system commands contained are group-owned by "root"
  block: 

    - name: check that the system command files are group-owned by "root"
      become: true
      shell: find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -group root
      register: lib_files
      failed_when: lib_files.rc != 0 or lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the system commands to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        group: root
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
