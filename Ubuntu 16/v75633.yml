---

- set_fact:
    stig_id: V-75633
    stig_text: "FAILED. the audit system does not authenticate off-loading audit records to a different system."
    target_file: /etc/audisp/audisp-remote.conf

- local_action: lineinfile regexp='^V-75633' path="{{ output_path }}" state=absent

- name: verify the audit system authenticates off-loading audit records to a different system.
  block:

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: audit_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: audit_file.stat.exists == False

    - name: check for action
      become: true
      shell:  grep enable_krb5 "{{ target_file }}"
      register: file_check
      failed_when: file_check.stdout == ""

    - assert:
        that: 
          - file_check.stdout is regex('^enable_krb5\s*\=+\s*yes$') != -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the audit system to authenticate off-loading audit records to a different system.
      become: true
      lineinfile:
        path: "{{ target_file }}"
        create: yes
        owner: root
        group: root
        mode: 0600
        state: present
        regexp: '^#*\s*enable_krb5.*$'
        line: 'enable_krb5=yes'
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
