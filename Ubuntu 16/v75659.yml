---

    - set_fact:
        stig_id: V-75659
        stig_text: 'FAILED. the audit event multiplexor is not configured to off-load audit records to a different system'
        target_file: /etc/audisp/plugins.d/au-remote.conf
    
    - local_action: lineinfile regexp='^V-75659' path="{{ output_path }}" state=absent
    
    - name: verify the audit event multiplexor is configured to off-load audit records to a different system or storage media from the system being audited.
      block: 
    
        - name: stat the audit file
          become: true
          stat:
            path: "{{ target_file }}"
          register: rules_file
    
        - fail: 
            msg: missing au-remote config file
          when: rules_file.stat.exists == False
    
        - name: check that the records are being off-loaded to a remote server 
          become: true
          shell: "grep -i active {{ target_file }}"
          register: audit_check
          failed_when: audit_check.stdout != 'active = yes'
    
        - set_fact:
            stig_text: "PASSED"
    
      rescue:
    
        - name: configure the audit event multiplexor to off-load audit records to a different system or storage media from the system being audited.
          become: true
          lineinfile:
            path: "{{ target_file }}"
            regexp: '^\#*.*active.*'
            line: active = yes
            state: present
            create: yes
            owner: root
            group: root
            mode: 0640
          register: config_updated
    
        - set_fact:
            stig_text: "PASSED"
          when: config_updated.failed == false
    
        - debug:
            msg: "{{ stig_id }} {{ stig_text }}"
    
        - name: restart audit service 
          become: true
          shell: systemctl restart auditd.service
          ignore_errors: yes
    
      always:
    
        - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
    