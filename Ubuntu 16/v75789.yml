---

- set_fact:
    stig_id: V-75789
    stig_text: 'FAILED. the OS does not generate an audit records when successful/unsuccessful attempts to use the "pam_timestamp_check" command occur.'
    target_file: /etc/audit/audit.rules

- local_action: lineinfile regexp='^V-75789' path="{{ output_path }}" state=absent

- name: Verify the OS generates an audit record when successful/unsuccessful attempts to use the "pam_timestamp_check" command occur.
  block: 

    - name: stat the audit file
      become: true
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail: 
        msg: missing audit rules file
      when: rules_file.stat.exists == False

    - name: check for audit rules param
      become: true
      shell: "grep -w pam_timestamp_check {{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout == '-a always,exit -F path=/usr/sbin/pam_timestamp_check -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged-pam_timestamp_check'
        msg: AUDIT RULES NOT CONFIGURED

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "pam_timestamp_check" command.
      become: true
      lineinfile:
        path: "/etc/audit/rules.d/pam_timestamp_check.rules"
        regexp: '^\#*.*/usr/sbin/pam_timestamp_check.*'
        line: -a always,exit -F path=/usr/sbin/pam_timestamp_check -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged-pam_timestamp_check
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart audit service 
      become: true
      shell: systemctl restart auditd.service
      ignore_errors: yes

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
