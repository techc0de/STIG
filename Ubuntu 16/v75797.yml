---

- set_fact:
    stig_id: V-75797

- local_action: lineinfile regexp='^V-75797' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. telnet package is installed"

- name: verfiy that the telnet package is not installed
  block:

    - shell: dpkg -l | egrep '^ii\s+telnetd\s+'
      register: telnet_check
      failed_when: telnet_check.rc != 1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: remove the telnet package
      become: true
      apt:
        name: telnetd
        state: absent
      register: remove_telnet

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: remove_telnet.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
