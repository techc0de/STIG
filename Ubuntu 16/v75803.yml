---

- set_fact:
    stig_id: V-75803
    stig_text: "FAILED. ufw package not found"

- local_action: lineinfile regexp='^V-75803' path="{{ output_path }}" state=absent

- name: check UFW install
  block: 

    - shell: "dpkg -l | grep ufw"
      register: ufw_check
      failed_when: ufw_check.stdout.find('ii  ufw') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: install the UFW package
      become: true
      apt:
        name: ufw
        state: present
        update_cache: yes
        cache_valid_time: 3600
      register: install_ufw

    - set_fact:
        stig_text: "PASSED"
      when: install_ufw.failed == false
      
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
