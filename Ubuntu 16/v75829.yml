---

- set_fact:
    stig_id: V-75829
    stig_text: "FAILED. approved SSH ciphers not configured"
    target_file: /etc/ssh/sshd_config

- local_action: lineinfile regexp='^V-75829' path="{{ output_path }}" state=absent

- stat:
    path: "{{ target_file }}"
  register: ssh_file
    
- name: verify that approved SSH ciphers are configured.
  block:

    - command: /bin/false
      when: ssh_file.stat.exists == False

    - shell: grep -i ciphers "{{ target_file }}" | grep -v '^#'
      register: shell_check
      failed_when: shell_check.rc != 0 or shell_check.stdout.find('Ciphers aes128-ctr,aes192-ctr,aes256-ctr') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the SSH daemon to use only approved ciphers
      become: true
      lineinfile:
        path: "{{ target_file }}"
        line: Ciphers aes128-ctr,aes192-ctr,aes256-ctr
        regexp: '^#*\s*Ciphers.*'
        state: present
      register: set_ciphers

    - set_fact:
        stig_text: "PASSED"
      when: set_ciphers.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart sshd.service
      become: true
      service:
        name: sshd
        state: restarted

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
