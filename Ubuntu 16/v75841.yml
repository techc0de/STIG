---

- set_fact:
    stig_id: V-75841
    stig_text: "FAILED. SSH daemon allows authentication using known hosts authentication."
    target_file: /etc/ssh/sshd_config

- local_action: lineinfile regexp='^V-75841' path="{{ output_path }}" state=absent

- name: verify the SSH daemon does not allow authentication using known hosts authentication.
  block: 

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: ssh_file

    - fail: 
        msg: missing sshd_config file
      when: ssh_file.stat.exists == False

    - shell: egrep '^\s*IgnoreUserKnownHosts\s+yes' "{{ target_file }}"
      register: ssh_check
      failed_when: ssh_check.stdout != 'IgnoreUserKnownHosts yes'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure SSH daemon to not allow authentication using known hosts authentication.
      become: true
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^\#*\s*IgnoreUserKnownHosts.*'
        line: IgnoreUserKnownHosts yes
        state: present
        create: yes
        owner: root
        group: root
        mode: 0744
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false
      
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart audit service 
      become: true
      shell: systemctl restart sshd.service
      ignore_errors: yes

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
