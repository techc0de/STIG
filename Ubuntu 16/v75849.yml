---

- set_fact:
    stig_id: V-75849
    stig_text: "FAILED. SSH daemon does not perform privilege separation."
    target_file: /etc/ssh/sshd_config

- local_action: lineinfile regexp='^V-75849' path="{{ output_path }}" state=absent

- name: check that the SSH daemon performs privilege separation.
  block: 

    - stat:
        path: "{{ target_file }}"
      register: ssh_file

    - fail: 
        msg: missing ssh_config file
      when: ssh_file.stat.exists == False

    - shell: "grep UsePrivilegeSeparation {{ target_file }}"
      register: ssh_check
      failed_when: ssh_check.rc != 0

    - assert:
        that: 
          - ssh_check.stdout == 'UsePrivilegeSeparation yes'
        msg: PRIVILEGE SEPERATION NOT CONFIGURED

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure SSH to use privilege separation
      become: true
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^\#*\s*UsePrivilegeSeparation.*'
        line: UsePrivilegeSeparation yes
        state: present
        create: yes
        owner: root
        group: root
        mode: 0744
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false
      
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart audit service 
      become: true
      shell: systemctl restart sshd.service

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
