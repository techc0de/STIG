---

- set_fact:
    stig_id: V-75851
    target_file: /etc/ssh/sshd_config
    stig_text: "FAILED. SSH daemon is allowing compression before authentication"

- local_action: lineinfile regexp='^V-75851' path="{{ output_path }}" state=absent
   
- name: verify the SSH daemon performs compression after a user successfully authenticates.
  block:

    - name: ensure sshd_config file is present
      stat:
        path: "{{ target_file }}"
      register: ssh_file
      failed_when: ssh_file.stat.exists == False

    - shell: egrep -w '^Compression (delayed|no)' "{{ target_file }}"
      register: shell_check
      failed_when: shell_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the SSH daemon to use compression only after authentication
      become: true
      lineinfile:
        path: "{{ target_file }}"
        line: Compression delayed
        regexp: '^#*\s*Compression.*'
        state: present
      register: config_update

    - set_fact:
        stig_text: "PASSED"
      when: config_update.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart sshd.service
      become: true
      service:
        name: sshd
        state: restarted

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes