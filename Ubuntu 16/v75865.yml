---

  - set_fact:
      stig_id: V-75865
      stig_text: 'FAILED. "rsyslog" is not configured to log cron events'
      target_file: /etc/rsyslog.d/50-default.conf
  
  - local_action: lineinfile regexp='^V-75865' path="{{ output_path }}" state=absent
  
  - name: verify that "rsyslog" is configured to log cron events.
    block: 
  
      - name: stat target_file
        become: true
        stat:
          path: "{{ target_file }}"
        register: stat_file
  
      - set_fact:
          stig_text: "FAILED. rsyslog config file does not exist."
        when: stat_file.stat.exists == False
  
      - fail: 
          msg: "{{ stig_text }}"
        when: stat_file.stat.exists == False

        
      - name: check for cron entry in rsyslog config file
        block:

          - name: check that remote access methods are being logged
            become: true
            shell: grep -E '^cron\.\*' "{{ target_file }}"
            register: grep_results
            failed_when: grep_results.stdout.find('cron.* /var/log/cron.log') == -1 
        
        rescue:

          - name: check to see if all facilities are being logged
            become: true
            shell: grep -i '^\*\.\*.*' "{{ target_file }}"
            register: fac_check
            failed_when: fac_check.stdout == ""
        
      - set_fact:
          stig_text: "PASSED"
  
    rescue:
      - name: touch the target file just to avoid failure in the next step
        become: true
        shell: touch "{{ target_file }}"
  
      - name: configure the OS to monitor all remote access methods
        become: true
        lineinfile:
          path: "{{ target_file }}"
          regexp: '^\#*\s*cron\.\*.*'
          line: cron.* /var/log/cron.log
        register: config_updated
  
      - set_fact:
          stig_text: "PASSED"
        when: config_updated.failed == false
  
      - debug:
          msg: "{{ stig_id }} {{ stig_text }}"
  
      - name: restart rsyslog.service
        become: true
        service:
          name: rsyslog
          state: restarted
  
    always:
  
      - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
  