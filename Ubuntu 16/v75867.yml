---

- set_fact:
    stig_id: V-75867
    stig_text: "FAILED. active wireless adapters detected"

- local_action: lineinfile regexp='^V-75867' path="{{ output_path }}" state=absent

- name: check for active wireless adapters
  block: 

    - shell: lshw -c network | grep -i capabilities | grep -i wireless | wc -l
      become: true
      register: count_wireless_adapters_check

    - shell: ifconfig -a | grep IEEE | wc -l
      become: true
      register: count_active_wireless_adapters_check
      failed_when: count_wireless_adapters_check.stdout|int > 0 and count_active_wireless_adapters_check.stdout|int > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
    
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
