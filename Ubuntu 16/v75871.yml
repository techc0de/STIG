---

- set_fact:
    stig_id: V-75871
    stig_text: "FAILED. at least two DNS servers not found in /etc/resolv.conf"

- local_action: lineinfile regexp='^V-75871' path="{{ output_path }}" state=absent

- name: check for DNS entries
  block: 

    - shell: grep hosts /etc/nsswitch.conf
      register: nsswitch_dns_check
      failed_when: nsswitch_dns_check.stdout.find('dns') == -1

    - shell: grep nameserver /etc/resolv.conf | grep -v '^#' | wc -l
      register: count_dns_hosts
      failed_when: count_dns_hosts.rc != 0 or count_dns_hosts.stdout|int < 2

    - set_fact:
        stig_text: "PASSED"

  rescue:
    
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
