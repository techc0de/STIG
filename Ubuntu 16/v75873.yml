---

- set_fact:
    stig_id: V-75873
    stig_text: "FAILED. the OS is forwading IPv4 source-routed packet."

- local_action: lineinfile regexp='^V-75873' path="{{ output_path }}" state=absent

- name: verify the OS does not accept IPv4 source-routed packets
  block:

    - name: check config value
      become: true
      shell: sysctl net.ipv4.conf.all.accept_source_route
      register: tcp_check
      failed_when: tcp_check.stdout.find('net.ipv4.conf.all.accept_source_route = 0') == -1
      
    - set_fact: 
        stig_text: "PASSED"

  rescue:

    - name: configure the os to not forward Internet Protocol version 4 (IPv4) source-routed packets
      become: true
      shell: sysctl -w net.ipv4.conf.all.accept_source_route=0
      register: tcp_fix

    - name: update config file
      become: true
      lineinfile:
        path: /etc/sysctl.conf
        line: net.ipv4.conf.all.accept_source_route = 0
        create: no
        regexp: '^\#*\s*net.ipv4.conf.all.accept_source_route'
        state: present
      register: config_updated

    - set_fact: 
        stig_text: "PASSED"
      when: tcp_fix.rc == 0 and config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

- local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes