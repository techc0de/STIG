---

- set_fact:
    stig_id: V-75877
    stig_text: "FAILED. the OS responds to IPv4 Internet Control Message Protocol (ICMP) echoes sent to a broadcast address."

- local_action: lineinfile regexp='^V-75877' path="{{ output_path }}" state=absent

- name: verify the OS does not respond to IPv4 Internet Control Message Protocol (ICMP) echoes sent to a broadcast address
  block:

    - name: check the value of the "icmp_echo_ignore_broadcasts" variable
      become: true
      shell: sysctl net.ipv4.icmp_echo_ignore_broadcasts
      register: tcp_check
      failed_when: tcp_check.stdout.find('net.ipv4.icmp_echo_ignore_broadcasts = 1') == -1
      
    - set_fact: 
        stig_text: "PASSED"

  rescue:

    - name: configure the os to not respond to Internet Protocol version 4 (IPv4) Internet Control Message Protocol (ICMP) echoes sent to a broadcast
      become: true
      shell: sysctl -w net.ipv4.icmp_echo_ignore_broadcasts=1
      register: tcp_fix

    - name: update config file
      become: true
      lineinfile:
        path: /etc/sysctl.conf
        line: net.ipv4.icmp_echo_ignore_broadcasts = 1
        create: no
        regexp: '^\#*\s*net.ipv4.icmp_echo_ignore_broadcasts'
        state: present
      register: config_updated

    - set_fact: 
        stig_text: "PASSED"
      when: tcp_fix.rc == 0 and config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

- local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes