---

- set_fact:
    stig_id: V-75883
    stig_text: "FAILED. the OS allows interfaces to perform Internet Protocol version 4 (IPv4) Internet Control Message Protocol (ICMP) redirects by default."

- local_action: lineinfile regexp='^V-75883' path="{{ output_path }}" state=absent

- name: verify the OS does not allow interfaces to perform Internet Protocol version 4 (IPv4) Internet Control Message Protocol (ICMP) redirects by default
  block:

    - name: check the value of the "default send_redirects" variables
      become: true
      shell: sysctl net.ipv4.conf.default.send_redirects
      register: tcp_check
      failed_when: tcp_check.stdout.find('net.ipv4.conf.default.send_redirects = 0') == -1
      
    - set_fact: 
        stig_text: "PASSED"

  rescue:

    - name: configure the os to not allow interfaces to perform Internet Protocol version 4 (IPv4) Internet Control Message Protocol (ICMP) redirects by default
      become: true
      shell: sysctl -w net.ipv4.conf.default.send_redirects=0
      register: tcp_fix

    - name: update config file
      become: true
      lineinfile:
        path: /etc/sysctl.conf
        line: net.ipv4.conf.default.send_redirects = 0
        create: no
        regexp: '^\#*\s*net.ipv4.conf.default.send_redirects'
        state: present
      register: config_updated

    - set_fact: 
        stig_text: "PASSED"
      when: tcp_fix.rc == 0 and config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

- local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes