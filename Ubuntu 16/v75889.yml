---

- set_fact:
    stig_id: V-75889
    stig_text: "FAILED. the network interfaces are in promiscuous mode"

- local_action: lineinfile regexp='^V-75889' path="{{ output_path }}" state=absent

- name: verify network interfaces are not in promiscuous mode unless approved by the Information System Security Officer (ISSO) and documented
  block:

    - shell: ip link | grep -i promisc | cut -d " " -f2 | tr -d ":"
      register: net_check
      failed_when: net_check.stdout_lines | length > 0
      
    - set_fact: 
        stig_text: "PASSED"

  rescue:

    - name: configure network interfaces to turn off promiscuous mode 
      become: true
      shell: ip link set "{{ item }}" promisc off
      with_items: "{{ net_check.stdout_lines }}"

    - shell: ip link | grep -i promisc | cut -d " " -f2 | tr -d ":"
      register: fix_check

    - set_fact: 
        stig_text: "PASSED"
      when: fix_check.stdout_lines | length == 0

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

- local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes