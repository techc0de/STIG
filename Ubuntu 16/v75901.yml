---

- set_fact:
    stig_id: V-75901
    stig_text: "FAILED. lightdm package is installed"

- local_action: lineinfile regexp='^V-75901' path="{{ output_path }}" state=absent

- name: verfiy that the lightdm package is not installed
  block:

    - shell: dpkg -l | egrep '^ii\s+lightdm\s+'
      register: package_check
      failed_when: package_check.rc != 1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove the lightdm package
      become: true
      apt:
        name: lightdm
        state: absent
      register: remove_package

    - set_fact:
        stig_text: "PASSED"
      when: remove_package.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

