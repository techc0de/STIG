---

- set_fact:
    stig_id: V-80965
    stig_text: "FAILED. audit records are not being off-loaded onto a different system or storage media"
    target_file: /etc/audisp/audisp-remote.conf

- local_action: lineinfile regexp='^V-80965' path="{{ output_path }}" state=absent

- name: verify the audit system off-loads audit records to a different system or storage media from the system being audited.
  block:

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file
      failed_when: audit_file.stat.exists == false

    - name: check for action
      become: true
      shell:  grep '^remote_server' "{{ target_file }}"
      register: file_check
      failed_when: file_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
    ## We Do not have a remote server configured to receive logs yet. Hold off remediation until that server is set up.
    # - name: configure the audit system to off-loads audit records to a different system or storage media from the system being audited
    #   become: true
    #   lineinfile:
    #     path: "{{ target_file }}"
    #     create: yes
    #     owner: root
    #     group: root
    #     state: present
    #     regexp: '^#*\s*remote_server.*$'
    #     line: 'remote_server=syslog'
    #   register: file_updated

    # - set_fact:
    #     stig_text: "PASSED"
    #   when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
