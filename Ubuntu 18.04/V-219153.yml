---

- set_fact:
    stig_id: V-219153
    stig_text: "FAILED. Ubuntu does not configured to off-load audit logs onto a different system in real time, if the system is interconnected."
    target_file: /etc/audisp/plugins.d/au-remote.conf

- local_action: lineinfile regexp='^V-219153' path="{{ output_path }}" state=absent

- name: Check for audispd-plugins config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Check that audisp-remote plugin is installed
      shell: dpkg -l | egrep '^ii  audispd-plugins'
      register: status
      failed_when: status.rc != 0

    - name: check if audisp is active
      shell: "grep -i 'active' {{ target_file }} | awk '{print $3}'"
      register: audit_check
      failed_when: audit_check.stdout != 'yes'

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Install audisp-remote plugin if it isn't installed.    
      become: true
      apt:
        name: audispd-plugins
        state: present
      register: install_pkg

    - name: Set the audisp-remote plugin as active.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^(.*)active.*$'
        line: active = yes
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

