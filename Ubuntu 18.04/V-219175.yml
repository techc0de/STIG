---

- set_fact:
    stig_id: V-219175
    stig_text: "FAILED. Ubuntu does not require the change of at least 8 characters when passwords are changed."
    target_file: /etc/security/pwquality.conf
     
- local_action: lineinfile regexp='^V-219175' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify the Ubuntu operating system requires the change of at least 8 characters when passwords are changed.
      shell:  grep -i "difok=8" "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Configure the Ubuntu operating system to require the change of at least 8 characters when passwords are changed.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^(.*)difok(.*)$'
        line: 'difok=8'
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

