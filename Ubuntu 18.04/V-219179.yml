---

- set_fact:
    stig_id: V-219179
    stig_text: "FAILED. Passwords for new users doesn't have a 60-day maximum password lifetime restriction."
    target_file: /etc/login.defs

- local_action: lineinfile regexp='^V-219179' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: grep -i pass_max_days 60 "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: Configure the Ubuntu operating system to enforce a 60-day maximum password lifetime.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^PASS_MAX_DAYS|^#PASS_MAX_DAYS'
        line: PASS_MAX_DAYS 60
        backrefs: yes
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

