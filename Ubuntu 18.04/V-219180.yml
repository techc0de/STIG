---

- set_fact:
    stig_id: V-219180
    stig_text: "FAILED. Ubuntu does not prohibit password reuse for a minimum of five generations."
    target_file: /etc/pam.d/common-password

- local_action: lineinfile regexp='^V-219180' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check Ubuntu operating system prevents passwords from being reused for a minimum of five generations.
      shell: grep -i 'remember=5' "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Configure the Ubuntu operating system prevents passwords from being reused for a minimum of five generations.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)pam_unix.so(.*)$'
        line: password [success=1 default=ignore] pam_unix.so sha512 shadow remember=5 rounds=5000
        state: present
        backrefs: yes
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes