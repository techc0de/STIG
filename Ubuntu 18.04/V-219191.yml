---

- set_fact:
    stig_id: V-219191
    stig_text: "FAILED. /var/log directory doesn't have mode 0750 or less permissive."
    target_file: /var/log

- local_action: lineinfile regexp='^V-219191' path="{{ output_path }}" state=absent

- name: Verify that the Ubuntu operating system configures the /var/log directory with a mode of 750 or less permissive.
  block: 

    - name: check for /var/log file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    # check for permission mode of 755 instead of 750 for /var/log/dvids to work
    - name: check if target file has mode of 750 or less permissive.
      become: true
      stat:
        path: "{{ target_file }}"
      register: file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist or files permission are incorrect."
      when: audit_file.stat.exists == False or file.stat.mode != '0755'

  rescue:
    # must set perm to 755 so that the logs in /var/log/dvids/ can be read.
    - name: create "{{ target_file }}" if it doesn't exist and change ownership to root.
      become: true
      file:
        path: "{{ target_file }}"
        mode: 0755
        state: directory
      register: dir_perms_rule 
 
    - name: configure the target file to have permissions mode of 0750.
      become: true
      file:
        path: "{{ target_file }}"
        owner: root
        group: syslog
        mode: 0755
        state: touch
      register: file_perms_rule 

    - name: set permanent permissions mode of 0750 in 00rsyslog.conf.
      become: true
      lineinfile:
        path: /usr/lib/tmpfiles.d/00rsyslog.conf
        create: no
        state: present
        regexp: '^z /var/log 0775(.*)$'
        line: 'z /var/log 0755 root syslog -'
        backrefs: yes
      register: 00rsyslog.conf
  
    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_perms_rule.changed == true
        - dir_perms_rule.changed == true
        - 00rsyslog.conf.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



