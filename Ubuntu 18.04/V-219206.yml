---

- set_fact:
    stig_id: V-219206
    stig_text: "FAILED. Ubuntu system doesn't have system commands owned by root."

- local_action: lineinfile regexp='^V-219206' path="{{ output_path }}" state=absent

- name: Verify the system commands contained in the following directories are owned by root.
  block: 
    - name: check the directories.
      become: true
      shell: 
        find -L 
        /bin 
        /sbin 
        /usr/bin 
        /usr/sbin 
        /usr/local/bin 
        /usr/local/sbin 
        ! -user root -type f -exec stat -c "%n %U" '{}' \;
      register: lib_files
      failed_when: lib_files.stdout | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the system commands and their respective parent directories to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        owner: root
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







