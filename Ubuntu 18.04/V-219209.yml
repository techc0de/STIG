---

- set_fact:
    stig_id: V-219209
    stig_text: 'FAILED. Ubuntu does not have directories that contain system commands group-owned by root.'

- local_action: lineinfile regexp='^V-219209' path="{{ output_path }}" state=absent

- name: Ensure system directories are own by root group.
  block: 
    - name: Verify the command directories are exists.
      become: true
      stat:
        path: "{{ item }}"
      loop:
        - /bin
        - /sbin
        - /usr/bin
        - /usr/sbin
        - /usr/local/bin
        - /usr/local/sbin
      register: command_directories
    
    - name: Verify the ownership of command directories are belong to root.
      loop: |
        {{ command_directories.results | map(attribute='item')
        | zip(command_directories.results | map(attribute='stat.gr_name'))
        | list }}

      assert:
        that: item.1 == 'root'
      loop_control:
        label: "{{ item.0 }}"

    - set_fact:
        stig_text: "PASSED"
    
  rescue:

    - name: configure the command directories ownership to root and create if it doesn't exist.
      become: true
      file:
        path: "{{ item.item }}"
        group: root
        state: "{{ 'file' if item.stat.exists else 'touch' }}"
      loop: "{{ command_directories.results }}"
      register: file_perms_rule 
  
    - set_fact:
        stig_text: "PASSED"
      when: file_perms_rule.changed

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







