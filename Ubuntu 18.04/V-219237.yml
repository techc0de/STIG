---

- set_fact:
    stig_id: V-219237
    stig_text: 'FAILED. Ubuntu does not allocate audit record storage capacity to store at least one weeks worth of audit records.'
    target_file: /etc/audit/auditd.conf
    default_log_file_path: /var/log/audit/audit.log

- local_action: lineinfile regexp='^V-219237' path="{{ output_path }}" state=absent

- name: verify that the "{{ target_file }}" file is exist.
  block: 

    - name: check for files
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_files

    - name: check for audit logs path
      become: true
      shell: grep -iw log_file "{{ target_file }}" | awk '{print $3}' | cut -d '"' -f 2
      register: log_file_path
      failed_when: log_file_path.stdout != default_log_file_path

    - set_fact:
        log_file_path: /var/log/audit/*

    - name: determine the size of the partition where the audit log is being stored has min. of 10GB.
      become: true
      shell: df -h "{{ log_file_path }}" | awk 'NR==2 { print $2}' | cut -d 'G' -f 1
      register: partition_size
      failed_when: partition_size.rc != 0 or partition_size.stdout | int < 10   

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
