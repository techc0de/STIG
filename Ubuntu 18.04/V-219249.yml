---

- set_fact:
    stig_id: V-219249
    stig_text: "FAILED. Ubuntu does not generate audit records for any usage of the fremovexattr system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219249' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep -i 'arch=b64 -S fremovexattr'
      register: audit_check
      failed_when: audit_check_64bit.rc != 0

    - name: check for 32-bit audit rules
      shell: auditctl -l | grep -i 'arch=b32 -S fremovexattr'
      register: audit_check
      failed_when: audit_check_32bit.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: add/update "fremovexattr auid>=1000" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*fremovexattr.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b64 -S fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod    
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000


    - name: add/update "fremovexattr auid=0" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*fremovexattr.*auid=0(.*)$'
        line: -a always,exit -F arch=b64 -S fremovexattr -F auid=0 -k perm_mod        
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid0

    - name: add/update "fremovexattr auid>=1000" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*fremovexattr.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b32 -S fremovexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod    
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000_32bit

    - name: add/update "fremovexattr auid=0" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*fremovexattr.*auid=0(.*)$'
        line: -a always,exit -F arch=b32 -S fremovexattr -F auid=0 -k perm_mod        
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid0_32bit      

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_auid1000.failed == false
        - file_updated_auid0.failed == false
        - file_updated_auid1000_32bit.failed == false
        - file_updated_auid0_32bit.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

