---

- set_fact:
    stig_id: V-219257
    stig_text: "FAILED. Ubuntu does not generate records for successful/unsuccessful uses of the of the creat, open, openat, open_by_handle_at, truncate, and ftruncate system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219257' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep 'open\|truncate\|creat'
      register: audit_check
      failed_when: audit_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: add/update "open_by_handle_at exit=-EPERM" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*open_by_handle_at.*exit=-EPERM(.*)$'
        line: -a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eperm

    - name: add/update "open_by_handle_at exit=-EACCES" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*open_by_handle_at.*exit=-EACCES(.*)$'
        line: -a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eacces   

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_eperm.failed == false
        - file_updated_eacces.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

