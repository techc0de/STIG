---

- set_fact:
    stig_id: V-219287
    stig_text: "FAILED. Ubuntu does not generate audit records when successful/unsuccessful attempts to use unlink, unlinkat, rename, renameat, and rmdir system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219287' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: auditctl -l | grep 'unlink\|rename\|rmdir'
      register: audit_check
      failed_when: audit_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: add/update "unlink auid>=1000" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*unlink.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=4294967295 -k delete
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000

    - name: add/update "unlink auid>=1000" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*unlink.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b32 -S unlink,unlinkat,rename,renameat,rmdir -F auid>=1000 -F auid!=4294967295 -k delete
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000_32bit

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_auid1000.failed == false
        - file_updated_auid1000_32bit.failed == false     

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
