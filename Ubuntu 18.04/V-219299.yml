---

- set_fact:
    stig_id: V-219299
    stig_text: "FAILED. Ubuntu does not generate audit records when successful/unsuccessful attempts to use the kmod command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219299' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: auditctl -l | grep kmod
      register: audit_check
      failed_when: audit_check.rc != 0 or audit_check.stdout_lines.find(#) != -1

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: remove any existing kmod rules from the file.      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)kmod(.*)$'
        state: absent
        create: yes

    - name: Configure the Ubuntu operating system to audit the execution of the module management program "kmod".
      lineinfile:
        path: "{{ target_file }}"
        line: |
          -w /bin/kmod -p x -k modules
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated
  
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
