---

- set_fact:
    stig_id: V-219329

- local_action: lineinfile regexp='^V-219329' path="{{ output_path }}" state=absent

- name: verify that temporary accounts have been provisioned with an expiration date of 72 hours 
  block: 

    - name: check for usernames with expiry dates
      become: true
      shell: >
        cut -f 1 -d: /etc/passwd | 
        xargs -n 1 -I {} bash -c "printf {} && chage -l {} | 
        sed -n 4p | 
        cut -d: -f2 | 
        tr -s \s" | 
        egrep -v .*never$ | 
        cut -d' ' -f1
      register: temp_users

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. found temporary user accounts."
      when: temp_users.stdout_lines | length > 0

    - command: /bin/false
      when: temp_users.stdout_lines | length > 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: set expiry date of 72 hours for any temporary users
      become: true
      shell: "chage -E `date -d'+3 days' +%Y-%m-%d` {{item}}"
      with_items: "{{ temp_users.stdout_lines }}"
      register: update_users

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: update_users.changed == true

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
