---

- set_fact:
    stig_id: V-219330
    stig_text: "FAILED. Ubuntu does not configured to use TCP syncookies."
    target_file: /etc/sysctl.conf

- local_action: lineinfile regexp='^V-219330' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check the value of TCP syncookies
      shell: sysctl net.ipv4.tcp_syncookies | awk '{print $3}'
      register: audit_check
      failed_when: audit_check.stdout != 1

    - name: check the saved value of TCP syncookies 
      shell: grep -i net.ipv4.tcp_syncookies /etc/sysctl.conf /etc/sysctl.d/* | grep -v '#'
      register: tcp_saved_value
      failed_when: tcp_saved_value.rc != 0

    - set_fact:
        stig_text: "PASSED"
      
  rescue:

    - name: configure the Ubuntu to use TCP syncookies
      become: true
      sysctl:
        name: net.ipv4.tcp_syncookies
        value: '1'
        state: present
        reload: true
        ignoreerrors: true
      register: enable_tcp  

    - name: update config file
      become: true
      lineinfile:
        path: /etc/sysctl.conf
        regexp: '^\#*\s*net.ipv4.tcp_syncookies'
        line: net.ipv4.tcp_syncookies = 1
        create: no
        state: present
      register: config_updated

    - set_fact: 
        stig_text: "PASSED"
      when: 
        - config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

