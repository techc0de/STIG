---

- set_fact:
    stig_id: V-219332
    stig_text: "FAILED. Ubuntu does not synchronize internal information system clocks to the authoritative time source when the time difference is greater than one second."
    target_file: /etc/chrony/chrony.conf
     
- local_action: lineinfile regexp='^V-219332' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify the operating system synchronizes internal system clocks to the authoritative time source when the time difference is greater than one second.
      shell:  grep -i "makestep 1 -1" "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Configure chrony to synchronize the internal system clocks to the authoritative source when the time difference is greater than one second.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^#*\s*makestep.*$'
        line: 'makestep 1 -1'
      register: file_updated

    - name: restart ntp service 
      become: true
      shell: systemctl restart ntp.service
      ignore_errors: yes

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

