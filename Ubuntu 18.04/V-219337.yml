---

- set_fact:
    stig_id: V-219337
    stig_text: "The Ubuntu operating system must enable and run the uncomplicated firewall(ufw)."

- local_action: lineinfile regexp='^V-219337' path="{{ output_path }}" state=absent

- name: Ensure uncomplicated firewall is enabled and running.
  block:

    - name: check if firewall is enabled.          
      shell: 'systemctl is-enabled ufw'
      register: ufw_enable

    - name: check if firewall is running           
      shell: 'systemctl is-active ufw'
      register: ufw_active

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: 
        - ufw_enable.stdout == 'enabled'
        - ufw_active.stdout == 'active'

  rescue:

    - name: Ensure ufw service is enabled       
      service:
        name: ufw
        state: started
        enabled: true
      register: ufw_enabled_service
  
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: ufw_enabled_service.changed | bool

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

