---

- set_fact:
    stig_id: V-219346
    stig_text: "FAILED. Active wireless adapters detected."

- local_action: lineinfile regexp='^V-219346' path="{{ output_path }}" state=absent

- name: check for active wireless adapters
  block: 

    - shell: lshw -c network | grep -i capabilities | grep -i wireless | wc -l
      become: true
      register: count_wireless_adapters_check

    - shell: ifconfig -a | grep IEEE | wc -l
      become: true
      register: count_active_wireless_adapters_check
      failed_when: count_wireless_adapters_check.stdout|int > 0 and count_active_wireless_adapters_check.stdout|int > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
    
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - set_fact:
        stig_text: "Please confirm with the Information System Security Officer (ISSO) to disable the active wireless adapters."

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
