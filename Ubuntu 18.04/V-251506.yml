---

- set_fact:
    stig_id: V-251506
    stig_text: 'FAILED. The Ubuntu operating system must not have accounts configured with blank or null passwords.'
    target_file: /etc/shadow

- local_action: lineinfile regexp='^V-251506' path="{{ output_path }}" state=absent

- name: Check the "/etc/shadow" file for blank passwords
  block: 

    - shell: |
        awk -F: '!$2 {print $1}' "{{ target_file }}"
      register: accounts
      failed_when: accounts.rc == 0 

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Ensure password fields are not empty | Lock account
      become: true
      user:
        name: "{{ item }}"
        password_lock: yes
      with_items: "{{ accounts.stdout_lines }}"
      when:
        - "{{ accounts.stdout_lines }}"


    - set_fact:
        stig_text: "PASSED"
      when: lock_accounts.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes