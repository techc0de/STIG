---

- set_fact:
    stig_id: V-219165
    stig_text: "FAILED. Ubuntu does not display the date and time of the last successful account logon upon logon."
    target_file: /etc/pam.d/login
     
- local_action: lineinfile regexp='^V-219165' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify users are provided with feedback on when account accesses last occurred.
      shell:  grep pam_lastlog "{{ target_file }}" | grep -i 'required'
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
 
    - name: Configure the Ubuntu operating system to provide users with feedback on when account accesses last occurred. 
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^#*\s*pam_lastlog.*$'
        line: session required pam_lastlog.so showfailed
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

