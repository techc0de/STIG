---

- set_fact:
    stig_id: V-219165
    stig_text: "FAILED. Ubuntu does not display the date and time of the last successful account logon upon logon."
    target_file: /etc/pam.d/login
     
- local_action: lineinfile regexp='^V-219165' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - shell: "grep '^session.*pam_lastlog' {{ target_file }}"
      register: login_check
      failed_when: login_check.rc == 2 or login_check.rc == 3

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: configure the os to provide users with feedback on when account accesses last occurred
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: login
        type: session
        control: required
        module_path: pam_loginuid.so
        new_type: session
        new_control: required
        new_module_path: pam_lastlog.so
        module_arguments: 'showfailed'
        state: after
      register: config_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: config_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
