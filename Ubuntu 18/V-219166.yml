---

- set_fact:
    stig_id: V-219166
    stig_text: "FAILED. Ubuntu doesn't automatically lock user account after three invalid logon attempts."
    target_file: /etc/pam.d/common-auth

- local_action: lineinfile regexp='^V-219166' path="{{ output_path }}" state=absent

- name: Check for common-auth file existence
  block: 

    - name: check for file existence
      shell: grep '^auth.*pam_tally' "{{ target_file }}"
      register: pam_check
      failed_when: pam_check.rc == 2 or pam_check == 3

    - assert:
        that: 
          - pam_check.stdout.find('#') == -1
          - pam_check.stdout.find('onerr=fail') != -1
          - pam_check.stdout.find('deny=3') != -1
        fail_msg: Common-auth file Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - shell: egrep -i '^auth\s+(\[success.*\])\s+pam_pkcs11.so.*' "{{ target_file }}" | grep -o '\[.*\]'
      register: control

    - shell: egrep -i '^auth\s+(\[success.*\])\s+pam_pkcs11.so.*' "{{ target_file }}" | grep -o 'pam.*.so'
      register: module

    - name: enable pam_tally module
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-auth
        type: auth
        control: "{{ control.stdout | default('[success=1 default=ignore]') }}"
        module_path: "{{ module.stdout | default('pam_unix.so') }}"
        new_type: auth
        new_control: required
        new_module_path: pam_tally2.so
        module_arguments: 'onerr=fail deny=3'
        state: before
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - name: enable pam_tally reset
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-account
        type: account
        control: 'required'
        module_path: pam_permit.so
        new_type: account
        new_control: required
        new_module_path: pam_tally2.so
        state: before

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

