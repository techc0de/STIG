---

- set_fact:
    stig_id: V-219179
    stig_text: "FAILED. Passwords for new users don't have a 60-day maximum password lifetime restriction."
    target_file: /etc/login.defs

- local_action: lineinfile regexp='^V-219179' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify that the Ubuntu operating system enforces a 60-day maximum password lifetime for new user accountss.
      shell: grep -i pass_max_days "{{ target_file }}" | grep '60'
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Configure the Ubuntu operating system to enforce a 60-day maximum password lifetime.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^#*\s*PASS_MAX_DAYS.*$'
        line: 'PASS_MIN_DAYS 60'
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

