---

- set_fact:
    stig_id: V-219190
    stig_text: "FAILED. The /var/log directory is not owned by root."
    target_file: /var/log

- local_action: lineinfile regexp='^V-219190' path="{{ output_path }}" state=absent

- name: Verify the Ubuntu operating system configures the /var/log directory to be owned by root.
  block: 

    - name: Check that the /var/log directory is owned by root.
      become: true
      stat:
        path: "{{ target_file }}"
      register: result
      failed_when: result.stat.pw_name != 'root'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the "{{ target_file }}" to be owned by root.
      become: true
      file:
        path: "{{ target_file }}"
        state: touch
        owner: root
      register: owner

    - set_fact:
        stig_text: "PASSED"
      when: owner.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes