---

- set_fact:
    stig_id: V-219212
    stig_text: "FAILED. The ctl-alt-del sequence is not disabled"
    target_file: /etc/systemd/system/ctrl-alt-del.target

- local_action: lineinfile regexp='^V-219212' path="{{ output_path }}" state=absent

- name: verify the OS is not configured to reboot the system when ctrl-alt-delete is pressed.
  block: 

    - shell: systemctl status ctrl-alt-del.target
      register: shell_output
      failed_when: shell_output.stdout.find('/dev/null') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - stat:
        path: "{{ target_file}}"
      register: link

    - name: remove symlink
      become: true
      file:
        path: "{{ target_file }}"
        state: absent
      when: link.stat.islnk is defined and link.stat.islnk

    - name: configure the system to disable the ctrl-alt-delete sequence for the command line
      become: true
      shell: systemctl mask ctrl-alt-del.target
      register: disable_cad
    
    - name: reload daemon
      become: true
      shell: systemctl daemon-reload

    - set_fact:
        stig_text: "PASSED"
      when: disable_cad.rc == 0

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes