---

- set_fact:
    stig_id: V-219216
    stig_text: "FAILED. Ubuntu does not generate audit records for privileged activities or other system-level access.
"
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219216' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: auditctl -l | grep sudo.log
      register: audit_check
      failed_when: audit_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the Ubuntu operating system to audit privileged activities.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)sudo.log(.*)$'
        line: -w /var/log/sudo.log -p wa -k actions       
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated
  
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
