---

- set_fact:
    stig_id: V-219247
    stig_text: "FAILED. Ubuntu does not generate audit records for any usage of the removexattr system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219276' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep removexattr
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S removexattr -F auid>=1000 -F auid!=-1 -k perm_mod') != -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S removexattr -F auid=0 -k perm_mod') != -1
     
    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: Configure the audit system to generate an audit event for any successful/unsuccessful use of the "removexattr auid=1000" system call.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)removexattr.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b64 -S removexattr -F auid>=1000 -F auid!=4294967295 -k perm_mod
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000

    - name: Configure the audit system to generate an audit event for any successful/unsuccessful use of the "removexattr auid=0" system call.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)removexattr.*auid=0(.*)$'
        line: -a always,exit -F arch=b64 -S removexattr -F auid=0 -k perm_mod
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid0

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_auid1000.failed == false
        - file_updated_auid0.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

