---

- set_fact:
    stig_id: V-219262
    stig_text: "FAILED. Ubuntu does not generate records for successful/unsuccessful uses of the of the open_by_handle_at system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219294' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep open_by_handle_at
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find(#) == -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S open_by_handle_at -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access') != -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S open_by_handle_at -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access') != -1
       
    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
          stig_text: "PASSED"

  rescue:

    - name: add/update the audit rules for 'open_by_handle_at exit=-EPERM'.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)open_by_handle_at.*EPERM(.*)$'
        line: -a always,exit -F arch=b64 -S open_by_handle_at -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_EPERM

    - name: add/update the audit rules for 'open_by_handle_at exit=-EACCES'.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)open_by_handle_at.*EACCES(.*)$'
        line: -a always,exit -F arch=b64 -S open_by_handle_at -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_EACCES

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_EPERM.failed == false
        - file_updated_EACCES.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

