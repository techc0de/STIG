---

- set_fact:
    stig_id: V-219268
    stig_text: "FAILED. Ubuntu does not generate audit records for successful/unsuccessful uses of the apparmor_parser command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219268' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep apparmor_parser
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('-a always,exit -F path=/sbin/apparmor_parser -F perm=x -F auid>=1000 -F auid!=-1 -k perm_chng') != -1
        fail_msg: Audit Rules Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "apparmor_parser" command.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)apparmor_parser(.*)$'
        line: -a always,exit -F path=/sbin/apparmor_parser -F perm=x -F auid>=1000 -F auid!=4294967295 -k perm_chng
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

