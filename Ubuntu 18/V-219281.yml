---

- set_fact:
    stig_id: V-219281
    stig_text: "FAILED. Ubuntu does not revent all software from executing at higher privilege levels than users executing the software..."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219281' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep -i 'arch=b64 -S execve'
      register: audit_check
      failed_when: audit_check_64bit.rc != 0

    - name: check for 32-bit audit rules
      shell: auditctl -l | grep -i 'arch=b32 -S execve'
      register: audit_check
      failed_when: audit_check_32bit.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: add/update "execve euid=0" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*execve.*euid=0(.*)$'
        line: -a always,exit -F arch=b64 -S execve -C uid!=euid -F euid=0 -F key=execpriv   
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_euid_0

    - name: add/update "execve egid=0" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*execve.*egid=0(.*)$'
        line: -a always,exit -F arch=b64 -S execve -C gid!=egid -F egid=0 -F key=execpriv       
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_egid_0

    - name: add/update "execve euid=0" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*execve.*euid=0(.*)$'
        line: -a always,exit -F arch=b32 -S execve -C uid!=euid -F euid=0 -F key=execpriv 
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_euid_0_32bit

    - name: add/update "execve egid=0" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*execve.*egid=0(.*)$'
        line: -a always,exit -F arch=b32 -S execve -C gid!=egid -F egid=0 -F key=execpriv        
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_egid_0_32bit      
  
    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_euid_0.failed == false
        - file_updated_egid_0.failed == false
        - file_updated_euid_0_32bit.failed == false
        - file_updated_egid_0_32bit.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

