---

- set_fact:
    stig_id: V-219281
    stig_text: "FAILED. Ubuntu does not revent all software from executing at higher privilege levels than users executing the software..."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219281' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep execve
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: Configure the Ubuntu operating system to audit the execution of all privileged functions for euid rule.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)execve.*euid(.*)$'
        line: -a always,exit -F arch=b64 -S execve -C uid!=euid -F key=execpriv
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_euid

    - name: Configure the Ubuntu operating system to audit the execution of all privileged functions for egid rule.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)execve.*egid(.*)$'
        line: -a always,exit -F arch=b64 -S execve -C gid!=egid -F key=execpriv
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_egid

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_euid.failed == false
        - file_updated_egid.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

