---

- set_fact:
    stig_id: V-219290
    stig_text: "FAILED. Ubuntu does not generate audit record when successful/unsuccessful use of renameat system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219290' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep -i 'arch=b64 -S renameat'
      register: audit_check
      failed_when: audit_check_64bit.rc != 0

    - name: check for 32-bit audit rules
      shell: auditctl -l | grep -i 'arch=b32 -S renameat'
      register: audit_check
      failed_when: audit_check_32bit.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: add/update "renameat auid>=1000" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*renameat.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b64 -S renameat -F auid>=1000 -F auid!=4294967295 -k delete   
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000

    - name: add/update "renameat auid>=1000" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*renameat.*auid>=1000(.*)$'
        line: -a always,exit -F arch=b32 -S renameat -F auid>=1000 -F auid!=4294967295 -k delete    
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000_32bit

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_auid1000.failed == false
        - file_updated_auid1000_32bit.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
