---

- set_fact:
    stig_id: V-219296
    stig_text: "FAILED. Ubuntu does not generate records for successful/unsuccessful uses of init_module or finit_module syscalls."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219296' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep -i 'arch=b64 -S init_module'
      register: audit_check
      failed_when: audit_check_64bit.rc != 0

    - name: check for 32-bit audit rules
      shell: auditctl -l | grep -i 'arch=b32 -S init_module'
      register: audit_check
      failed_when: audit_check_32bit.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the audit system to generate an audit event for any use of the "init_module" or "finit_module" system calls.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64 -S init_module.*-F(.*)$'
        line: -a always,exit -F arch=b64 -S init_module -S finit_module -F key=modules
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_64_bit

    - name: add/update "init_module" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32 -S init_module.*-F(.*)$'
        line: -a always,exit -F arch=b32 -S init_module -S finit_module -F key=modules
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_32_bit

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_64_bit.failed == false
        - file_updated_32_bit.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

