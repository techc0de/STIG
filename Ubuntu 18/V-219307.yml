---

- set_fact:
    stig_id: V-219307
    stig_text: "FAILED. Ubuntu does not implement DoD-approved encryption to protect the confidentiality of remote access sessions."
    target_file: /etc/pam_pkcs11/pam_pkcs11.conf

- local_action: lineinfile regexp='^V-219307' path="{{ output_path }}" state=absent

- name: Check for target file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Check the SSH daemon's current configured ciphers 
      shell: grep -E '^Ciphers ' "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0 or audit_check.stdout.find('aes') == -1

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Configure the Ubuntu operating system to allow the SSH daemon to only implement DoD-approved encryption.
      lineinfile:
          path: "{{ target_file }}"
          owner: root
          group: root
          mode: 0600
          state: present
          create: yes
          regexp: '^#*\s*Ciphers.*'
          line: Ciphers aes128-ctr,aes192-ctr,aes256-ctr
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

