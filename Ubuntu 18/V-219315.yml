---

- set_fact:
    stig_id: V-219315
    stig_text: "FAILED. Ubuntu doesn't validate certificates by constructing a certification path."
    target_file: /etc/pam_pkcs11/pam_pkcs11.conf

- local_action: lineinfile regexp='^V-219315' path="{{ output_path }}" state=absent

- name: Verify the Ubuntu operating system, for PKI-based authentication, had valid certificates.
  block: 

    - name: check for OCSP policy
      shell: egrep -w '^cert_policy\s+\=\s+ca,signature,ocsp_on$' "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False
    
    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the Ubuntu operating system to certificate status checking for multifactor authentication.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^#*\s*cert_policy.*$'
        line: 'cert_policy = ca,signature,ocsp_on'
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false
      
    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



