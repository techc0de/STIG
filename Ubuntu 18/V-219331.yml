---

- set_fact:
    stig_id: V-219331
    target_file: /etc/chrony/chrony.conf

- local_action: lineinfile regexp='^V-219331' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. Ubuntu failed to compare internal clock system with one of the USNO time server..."
    
- name: verify that unattended or automatic login via ssh is disabled.
  block:

    - stat:
        path: "{{ target_file }}"
      register: ntp_file
      failed_when: ntp_file.stat.exists == False

    - name: check if an authoriative DOD time source maxpoll is set to 17.
      shell: grep -i maxpoll "{{ target_file }}"
      register: shell_check
      failed_when: shell_check.stdout != "maxpoll 17"

    - name: verify that the chrony.conf file is configured to an authoriative DoD time source.
      shell: grep -i '^server' "{{ target_file }}"
      register: time_source
      failed_when: time_source.rc != 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: set the DoD time server and change the maxpoll value.
      become: true
      lineinfile:
        path: "{{ target_file }}"
        create: yes
        regexp: '^(.*)maxpoll(.*)$'
        line: 'server ntp2.usno.navy.mil iburst maxpoll 17'
        state: present
      register: update_dod_time_source
      ignore_errors: yes

    - name: restart NTP service
      become: true
      shell: systemctl restart ntp.service
      register: restart
      ignore_errors: yes

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: update_dod_time_source.failed == false 

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"
    
  always:
    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes