---

- set_fact:
    stig_id: V-219339
    stig_text: "FAILED. Ubuntu does notdisable automatic mounting of USB mass storage driver."
    target_file: /etc/modprobe.d/*

- local_action: lineinfile regexp='^V-219339' path="{{ output_path }}" state=absent

- name: Check for target_file file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify that Ubuntu operating system disables ability to load the USB storage kernel module.
      shell: grep usb-storage "{{ target_file }}" | grep "/bin/true"
      register: module_check
      failed_when: module_check.rc != 0

    - name: Verify the operating system disables the ability to use USB mass storage device.
      shell: grep usb-storage "{{ target_file }}" | grep -i "blacklist"
      register: blacklist
      failed_when: blacklist.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
 
    - name: Configure the Ubuntu operating system to disable using the USB storage kernel module.
      shell: sudo su -c "echo install usb-storage /bin/true >> /etc/modprobe.d/DISASTIG.conf"
      register: module_update

    - name: Configure the operating system to disable the ability to use USB mass storage devices.
      shell: sudo su -c "echo blacklist usb-storage >> /etc/modprobe.d/DISASTIG.conf"
      register: disable_usb

    - set_fact:
        stig_text: "PASSED"
      when: 
        - module_update.failed == false
        - disable_usb.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

