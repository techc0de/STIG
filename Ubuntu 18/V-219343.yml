---

- set_fact:
    stig_id: V-219343

- local_action: lineinfile regexp='^V-219343' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. aide package not found"

- name: verify that Advanced Intrusion Detection Environment (AIDE) is installed
  block: 

    - shell: "dpkg -l | grep aide"
      register: aide_check

    - command: /bin/false
      when: aide_check.stdout.find('ii  aide') == -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: install the AIDE package
      become: true
      apt:
        name: aide
        state: present
        update_cache: yes
        cache_valid_time: 3600
      register: install_aide

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: install_aide.failed == false
      
    - debug:
        var: stig_text

    - name: disable scanning of mounted isilon drive
      become: true
      lineinfile:
        path:  /etc/aide/aide.conf
        line: >
          !/media/.*

    - name: init aide service to create db 
      become: true
      shell: aideinit
      ignore_errors: yes

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
