---

- set_fact:
    stig_id: V-219157
    stig_text: "FAILED. The Network Information Service (NIS) package is installed."
   
- local_action: lineinfile regexp='^V-219157' path="{{ output_path }}" state=absent

- name: Ensure NIS package isn't installed.
  block: 

    - name: check for rsh-server package
      shell: dpkg -l | grep nis
      register: package_check
      failed_when: package_check.rc == 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove NIS package if it's installed.      
      become: true
      apt:
        name: nis
        state: absent
      register: remove_pkg

    - set_fact:
        stig_text: "PASSED"
      when: remove_pkg.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



