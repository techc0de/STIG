---

- set_fact:
    stig_id: V-219177
    stig_text: "FAILED. Ubuntu has Telnet package installed."
   
- local_action: lineinfile regexp='^V-219177' path="{{ output_path }}" state=absent

- name: Ensure Telnet package isn't installed.
  block: 

    - name: check for Telnet package
      shell: dpkg -l | grep telnetd
      register: package_check
      failed_when: package_check.rc == 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove Telnet package if it's installed.      
      become: true
      apt:
        name: telnetd
        state: absent
      register: remove_pkg

    - set_fact:
        stig_text: "PASSED"
      when: remove_pkg.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



