---

- set_fact:
    stig_id: V-219217
    stig_text: "FAILED. Ubuntu does not generate audit records for the /var/log/wtmp file."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219217' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep '/var/log/wtmp'
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('#') == -1
          - audit_check.stdout.find('-w /var/log/wtmp -p wa -k logins') != -1
        fail_msg: Audit Rules Not Configured

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: remove any existing "wtmp" rules from audit file      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)/var/log/wtmp(.*)$'
        state: absent
        create: yes
        backup: yes

    - name: Configure the audit system to generate audit records for the /var/log/wtmp file.
      lineinfile:
        path: "{{ target_file }}"
        line: -w /var/log/wtmp -p wa -k logins
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

