---

- set_fact:
    stig_id: V-219224
    stig_text: "FAILED. Ubuntu does not generate audit records for all account creations, modifications, disabling, and termination events that affect /etc/security/opasswd."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219224' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep opasswd
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('-w /etc/security/opasswd -p wa -k usergroup_modification') != -1
        fail_msg: Audit Rules Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: remove any existing "sudoedit" rules from audit file      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)opasswd(.*)$'
        state: absent
        create: yes
        backup: yes

    - name: configure/update the audit rules for opasswd.
      lineinfile:
        path: "{{ target_file }}"
        line: |
          -w /etc/security/opasswd -p wa -k usergroup_modification
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

