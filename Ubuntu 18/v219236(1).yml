---

- set_fact:
    stig_id: V-219236
    stig_text: 'FAILED. Audit configuration files are write-accessible by unauthorized groups.'
    target_files: 
      - /etc/audit/audit.rules
      - /etc/audit/auditd.conf
      - /etc/audit/rules.d

- local_action: lineinfile regexp='^V-219236' path="{{ output_path }}" state=absent

- name: verify that the "/etc/audit/audit.rules", "/etc/audit/rules.d/*" and "/etc/audit/auditd.conf"  files have mode "0640" or less permissive
  block: 

    - name: find any file in the /etc/audit/rules.d directory
      become: true
      find:
        paths: "{{ target_files }}"
        file_type: file
        recurse: yes
      register: file_perms


    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the file ownership of "/etc/audit/audit.rules" to root.
      become: true
      file:
        path: "/etc/audit/audit.rules"
        owner: root
        group: root
        mode: 0640
        state: touch
      register: file_perms_rule
      
    - name: change the file ownership of "/etc/audit/auditd.conf" to root.
      become: true
      file:
        path: "/etc/audit/auditd.conf"
        owner: root
        group: root
        mode: 0640
        state: touch
      register: file_perms_conf


      - name: change the file ownership of "/etc/audit/rules.d" to root.
        become: true
        file:
          path: "/etc/audit/rules.d"
          owner: root
          group: root
          mode: 0640
          state: touch
          recurse: yes
        register: rules_perms_conf

    - set_fact:
        stig_text: "PASSED"
      when: file_perms_rule.changed == true and file_perms_conf == true and rules_perms_conf.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
