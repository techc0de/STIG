---

- set_fact:
    stig_id: V-219236
    stig_text: 'FAILED. Audit configuration files are write-accessible by unauthorized groups.'
    target_files: 
      - /etc/audit/
      - /etc/audit/rules.d/*

- local_action: lineinfile regexp='^V-219236' path="{{ output_path }}" state=absent

- name: verify that the "/etc/audit/" and "/etc/audit/rules.d/*" files are exist and own by root.
  block: 

    - name: check for files
      become: true
      stat:
        path: "{{ target_files }}"
      register: audit_files

    - name: check if files/directories are own by root
      become: true
      shell: ls -la "{{ target_files }}" | awk '{print $4}'
      register: file_group

    - fail:
        msg: "FAILED. {{ target_files }} file does not exist or files permission are incorrect."
      when: 
        - not audit_files.stat.exists
        - file_group.stdout != 'root'

  rescue:

    - name: create '/etc/audit/rules.d' if it doesn't exist and change ownership to root.
      become: true
      file:
        path: "/etc/audit/rules.d"
        owner: root
        group: root
        mode: 0640
        state: directory
        recurse: yes
      register: dir_perms_rule 

 
    - name: create the below files if they don't exist and change ownership to root.
      become: true
      file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: 0640
        state: touch
      loop: "{{ target_files }}"
      register: file_perms_rule 
  
    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_perms_rule.changed == true
        - dir_perms_rule.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



