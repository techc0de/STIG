---

- name: ensure Ubuntu 18 is able to generate audit records successful/unsuccessful for the uses of ssh-agent command.
  hosts: localhost
  become: true

  vars:
    stig_id: V-219242
    stig_text: "FAILED. Ubuntu does not generate audit record when attempts to use ssh-agent command."
    target_file: /etc/audit/rules.d/stig.rules

#  local_action: lineinfile regexp='^V-219242' path="{{ output_path }}" state=absent

  tasks:
    - block: 
        - name: check for the file
          stat:
            path: "{{ target_file }}"
          register: rules_file

        - fail:
            msg: "FAILED. {{ target_file }} file does not exist."
          when: rules_file.stat.exists == False
  
        - name: check for audit rules
          shell: auditctl -l | grep '/usr/bin/ssh-agent'
          register: audit_check
          failed_when: audit_check.rc != 0

        - assert:
            that: 
              - audit_check.stdout.find('-a always,exit -F path=/usr/bin/ssh-agent -F perm=x -F auid>=1000 -F auid!=-1 -k privileged-ssh') != -1
            msg: Audit Rules Not Configured

        - set_fact:
            stig_text: "PASSED"

      rescue:
        - name: remove any existing "ssh-agent" rules from audit file      
          lineinfile:
            path: "/etc/audit/rules.d/stig.rules"
            regexp: '^(.*)ssh-agent(.*)$'
            state: absent
            create: yes
            backup: yes

        - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "ssh-agent" command.
          lineinfile:
            path: "/etc/audit/rules.d/stig.rules"
            line: |
              -a always,exit -F path=/usr/bin/ssh-agent -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged-ssh
            state: present
            create: yes
            owner: root
            group: root
            mode: 0640 
          register: file_updated
     
        - set_fact:
            stig_text: "PASSED"
          when: file_updated.failed == false

        - name: reload the rules file
          shell: augenrules --load
          register: reload_rules

        - debug:
            msg: "{{ stig_id }} {{stig_text}}"

#      always:
#        - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
