---

- set_fact:
    stig_id: V-219263
    stig_text: "FAILED. Ubuntu does not generate audit record when attempts to use sudo command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219263' path="{{ output_path }}" state=absent

- name: verify the os generates an audit record when attempts to use the sudo command occur.
  block:

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      become: true
      shell: auditctl -l | grep /usr/bin/sudo
      register: audit_check
      failed_when: audit_check.rc == 1 or audit_check.rc == 3

    - assert:
        that: 
          - audit_check.stdout.find('-a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=-1 -k priv_cmd') != -1
          
    - set_fact:
        stig_text: "PASSED"

  rescue:
   
    - name: remove any existing "sudo" rules from audit file      
      lineinfile:
        path: "/etc/audit/rules.d/stig.rules"
        regexp: '^(.*)sudo(.*)$'
        state: absent
        create: yes

    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "sudo" command.
      become: true
      lineinfile:
        path: "/etc/audit/rules.d/stig.rules"
        create: yes
        owner: root
        group: root
        state: present
        line: |
          -a always,exit -F path=/usr/bin/sudo -F perm=x -F auid>=1000 -F auid!=4294967295 -k priv_cmd
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
