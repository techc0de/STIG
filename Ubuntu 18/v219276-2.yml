---

- name: ensure Ubuntu 18 is able to generate audit records successful for crontab.
  hosts: localhost
  become: true
  become_user: root

  vars:
    stig_id: V-219276
    stig_text: "FAILED. Ubuntu does not generate audit record when attempts to use crontab command."
    target_file: /etc/audit/rules.d/stig.rules

#  local_action: lineinfile regexp='^V-219276' path="{{ output_path }}" state=absent

  tasks:
    - block: 
        - name: check for the file
          stat:
            path: "{{ target_file }}"
          register: rules_file

        - fail:
            msg: "FAILED. {{ target_file }} file does not exist."
          when: rules_file.stat.exists == False
  
        - name: check for audit rules
          shell: auditctl -l | grep -w crontab
          register: audit_check
          failed_when: audit_check.rc != 0

        - assert:
            that: 
              - audit_check.stdout.find('-a always,exit -F path=/usr/bin/crontab -F perm=x -F auid>=1000 -F auid!=-1 -k privileged-crontab') != -1
            msg: Crontab Audit Rules Not Configured

        - set_fact:
            stig_text: "PASSED"

      rescue:
        - name: remove any existing "crontab" rules from audit file      
          lineinfile:
            path: "/etc/audit/rules.d/stig.rules"
            regexp: '^(.*)crontab(.*)$'
            state: absent
            create: yes
            backup: yes

        - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "crontab" command.
          lineinfile:
            path: "/etc/audit/rules.d/stig.rules"
            line: |
              -a always,exit -F path=/usr/bin/crontab -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged-crontab
            state: present
            create: yes
            owner: root
            group: root
            mode: 0640 
          register: file_updated
     
        - set_fact:
            stig_text: "PASSED"
          when: file_updated.failed == false

        - name: reload the rules file
          shell: augenrules --load
          register: reload_rules

        - debug:
            msg: "{{ stig_id }} {{stig_text}}"

#      always:
#        - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
