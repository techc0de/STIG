---

- set_fact:
    stig_id: V-219340
    stig_text: "FAILED. UFW not configured to rate limit traffic."

- local_action: lineinfile regexp='^V-219340' path="{{ output_path }}" state=absent

- name: check if UFW rate limits SSH
  block:
  
    - shell: ufw status numbered | grep -P '22/tcp\s+LIMIT IN' | wc -l
      become: true
      register: count_ssh_limit_rules_check
      failed_when: count_ssh_limit_rules_check.stdout|int == 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure UFW to rate limit SSH service.
      become: true
      shell: ufw limit ssh
      register: ufw_updated

    - set_fact:
        stig_text: "PASSED"
      when: ufw_updated.rc == 0

    
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
