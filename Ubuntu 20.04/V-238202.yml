---

- set_fact:
    stig_id: V-238202
    stig_text: "FAILED. Passwords for new users don't have a 24 hours/1 day minimum password lifetime restriction."
    target_file: /etc/login.defs

- local_action: lineinfile regexp='^V-238202' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for one day minimum password lifetime for new user accounts.
      shell: grep -i pass_min_days "{{ target_file }}" | grep '1'
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
 
    - name: Configure the Ubuntu operating system to enforce a 24 hours/1 day minimum password lifetime.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^(.*)PASS_MIN_DAYS(.*)$'
        line: 'PASS_MIN_DAYS 1'
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

