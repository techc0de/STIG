---

- set_fact:
    stig_id: V-238215
    stig_text: "FAILED. Ubuntu failed to use SSH to protect the confidentiality and integrity of transmitted info. "
    

- local_action: lineinfile regexp='^V-238215' path="{{ output_path }}" state=absent

- name: Ensure ssh package is installed and running.
  block: 

    - name: Check that the ssh package is installed.
      shell: dpkg -l | grep openssh
      register: package_check
      failed_when: package_check.rc != 0

    - name: check that the sshd service is loaded and active.
      shell: systemctl status sshd.service | egrep -i "(active|loaded)"
      register: status
      failed_when: status.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: Install openssh if it isn't installed.    
      become: true
      apt:
        name: ssh
        state: present
      register: install_pkg 

    - name: enable and start sshd.service
      become: true
      service:
        name: sshd
        enabled: true
        state: started
      register: start

    - set_fact:
        stig_text: "PASSED"
      when: install_pkg.failed == false or start | bool

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



