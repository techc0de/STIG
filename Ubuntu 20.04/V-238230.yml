---

- set_fact:
    stig_id: V-238230
    stig_text: "FAILED. Ubuntu doesn't implement multifactor authentication for remote access to privileged accounts."

- local_action: lineinfile regexp='^V-238230' path="{{ output_path }}" state=absent

- name: Verify the Ubuntu operating system has the 'libpam-pkcs11' package installed.
  block: 

    - shell: dpkg -l | grep libpam-pkcs11
      register: pkg_check
      failed_when: pkg_check.stdout.find('ii  libpam-pkcs11') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: install the libpam-pkcs11 package
      become: true
      apt:
        name: libpam-pkcs11
        state: present
        update_cache: yes
        cache_valid_time: 3600
      register: install_package

    - set_fact:
        stig_text: "PASSED"
      when: install_package.failed == false
        
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
