---

- set_fact:
    stig_id: V-238237
    stig_text: "FAILED. Ubuntu does not enforce a delay of at least 4 seconds between logon prompts following a failed logon attempt."
    target_file: /etc/pam.d/common-auth
     
- local_action: lineinfile regexp='^V-238237' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify the Ubuntu operating system enforces a delay of at least 4 seconds between logon prompts following a failed logon attempt.
      shell:  grep pam_faildelay "{{ target_file }}" | grep -i 'delay=4000000'
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
 
    - name: Configure the Ubuntu operating system to enforce a delay of at least 4 seconds between logon prompts following a failed logon attempt.
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-auth
        type: auth
        control: required
        module_path: pam_tally2.so
        new_type: auth
        new_control: required
        new_module_path: pam_faildelay.so
        module_arguments: 'delay=4000000'
        state: after
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

