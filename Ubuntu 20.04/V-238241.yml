---

- set_fact:
    stig_id: V-238241
    stig_text: "FAILED. Ubuntu does not generate audit records for all account creations, modifications...events."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238241' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep gshadow
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('-w /etc/gshadow -p wa -k usergroup_modification') != -1
        fail_msg: Audit Rules Not Configured

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False


  rescue:
   
    - name: configure the audit rules for gshadow.
      lineinfile:
        path: "{{ target_file }}"
        line: -w /etc/gshadow -p wa -k usergroup_modification
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

