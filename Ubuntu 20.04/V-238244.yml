---

- set_fact:
    stig_id: V-238244
    stig_text: "FAILED. Ubuntu does not hut down by default upon audit failure (unless availability is an overriding concern)."
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-238244' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: grep disk_full_action "{{ target_file }}" | awk '{print $3}' | egrep -E "(SYSLOG|SINGLE|HALT)"
      register: audit_check
      failed_when: audit_check.rc != 0 or audit_check.stdout_lines.find(#) != -1

    - set_fact:
        stig_text: "PASSED"

  rescue:
 
    - name: Configure the Ubuntu operating system to shut down by default upon audit failure (unless availability is an overriding concern).
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)disk_full_action(.*)$'
        line: disk_full_action = HALT     
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - name: restart auditd service
      service:
        name: auditd
        state: restarted
       
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
