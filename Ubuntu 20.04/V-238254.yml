---

- set_fact:
    stig_id: V-238254
    stig_text: "FAILED. Ubuntu does not generate audit records for successful/unsuccessful uses of the mount command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238254' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep -i '/bin/mount'
      register: audit_check
      failed_when: audit_check.stdout | length < 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
  
    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "mount" command.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)mount(.*)$'
        line: -a always,exit -F path=/usr/bin/mount -F perm=x -F auid>=1000 -F auid!=-1 -k privileged-mount
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

