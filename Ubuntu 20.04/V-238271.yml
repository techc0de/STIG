---

- set_fact:
    stig_id: V-238271
    stig_text: "FAILED. Ubuntu does not generate audit records for successful/unsuccessful uses of the creat, open, openat, open_by_handle_at, truncate, and ftruncate system calls."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238271' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep 'open\|truncate\|creat'
      register: audit_check
      failed_when: audit_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: add/update "open exit=-EPERM" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*creat.*exit=-EPERM(.*)$'
        line: -a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eperm

    - name: add/update "open exit=-EACCES" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*creat.*exit=-EACCES(.*)$'
        line: -a always,exit -F arch=b64 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access    
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eacces

    - name: add/update "open exit=-EPERM" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*creat.*exit=-EPERM(.*)$'
        line: -a always,exit -F arch=b32 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access 
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eperm_32bit

    - name: add/update "open exit=-EACCES" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*creat.*exit=-EACCES(.*)$'
        line: -a always,exit -F arch=b32 -S creat,open,openat,open_by_handle_at,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access   
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eacces_32bit      

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_eperm.failed == false
        - file_updated_eacces.failed == false
        - file_updated_eperm_32bit.failed == false
        - file_updated_eacces_32bit.failed == false  

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

