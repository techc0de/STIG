---

- set_fact:
    stig_id: V-238274
    stig_text: "FAILED. Ubuntu does not generate audit records for successful/unsuccessful uses of the creat system call."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238274' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep -i 'arch=b64 -S creat'
      register: audit_check
      failed_when: audit_check_64bit.rc != 0

    - name: check for 32-bit audit rules
      shell: auditctl -l | grep -i 'arch=b32 -S creat'
      register: audit_check
      failed_when: audit_check_32bit.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
  
    - name: add/update "creat EPERM" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*creat.*-EPERM(.*)$'
        line: -a always,exit -F arch=b64 -S creat -F exit=-EPERM -F auid>=1000 -F auid!=-1 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eperm


    - name: add/update "creat EACCES" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*creat.*EACCES(.*)$'
        line: -a always,exit -F arch=b64 -S creat -F exit=-EACCES -F auid>=1000 -F auid!=-1 -k perm_access  
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eaccess

    - name: add/update "creat EPERM" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*creat.*EPERM(.*)$'
        line: -a always,exit -F arch=b32 -S creat -F exit=-EPERM -F auid>=1000 -F auid!=-1 -k perm_access   
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eperm_32_bit

    - name: add/update "creat EACCES" 32-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*creat.*EACCES(.*)$'
        line: -a always,exit -F arch=b32 -S creat -F exit=-EACCES -F auid>=1000 -F auid!=-1 -k perm_access      
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_eacces_32bit      
      
    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_eperm.failed == false
        - file_updated_eaccess.failed == false
        - file_updated_eperm_32_bit.failed == false
        - file_updated_eacces_32bit.failed == false

    - name: reload the rules file
      become: true
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

