---

- set_fact:
    stig_id: V-238281
    stig_text: "FAILED. Ubuntu does not generate audit record when attempts to use chcon command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238281' path="{{ output_path }}" state=absent

- name: Check for stig config file existence.
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: auditctl -l | grep chcon
      register: audit_check
      failed_when: audit_check.stdout | length < 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "chcon" command.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)/usr/bin/chcon(.*)$'
        line: -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=-1 -k perm_chng
        state: present
        create: yes
      register: file_updated
  
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      become: true
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
