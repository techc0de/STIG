---

- set_fact:
    stig_id: V-238284
    stig_text: "FAILED. Ubuntu does not generate audit records for successful/unsuccessful uses of the chacl command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238284' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep -i chacl
      register: audit_check
      failed_when: audit_check.stdout | length < 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
  
    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "chacl" command.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)chacl(.*)$'
        line: '-a always,exit -F path=/usr/bin/chacl -F perm=x -F auid>=1000 -F auid!=-1 -k perm_chng'
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

