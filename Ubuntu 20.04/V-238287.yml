---

- set_fact:
    stig_id: V-238287
    stig_text: "FAILED. Ubuntu does not generate audit records for the use and modification of the lastlog file."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238287' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: auditctl -l | grep lastlog
      register: audit_check
      failed_when: audit_check.stdout | length < 0

    - set_fact:
        stig_text: "PASSED"

  rescue:
 
    - name: add/update "lastlog" rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)lastlog(.*)$'
        line: -w /var/log/lastlog -p wa -k logins        
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated
  
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
