---

- set_fact:
    stig_id: V-238295
    stig_text: "FAILED. Ubuntu does not generate records for successful/unsuccessful uses of init_module syscall."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238295' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for 64-bit audit rules
      shell: auditctl -l | grep -i 'init_module'
      register: audit_check
      failed_when: audit_check_64bit.stdout | length < 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the audit system to generate an audit event for any use of the "init_module" call.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64 -S init_module.*-F(.*)$'
        line: -a always,exit -F arch=b64 -S init_module -F auid>=1000 -F auid!=-1 -k module_chng
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_64_bit

    - set_fact:
        stig_text: "PASSED"
      when: file_updated_64_bit.changed


    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

