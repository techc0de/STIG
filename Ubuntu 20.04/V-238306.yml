---

- set_fact:
    stig_id: V-238306
    stig_text: "FAILED. Ubuntu does not configured to off-load audit logs onto a different system or storage media from the system being audited."
    target_file: /etc/audisp/plugins.d/au-remote.conf
     
- local_action: lineinfile regexp='^V-238306' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audispd-plugins package
      shell: dpkg -l | egrep '^ii  audispd-plugins'
      register: package_check
      failed_when: package_check.rc != 0  

    - name: Check that the records are being off-loaded to a remote server.
      shell:  grep -i "active = yes" "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

  rescue:
    - name: Install audisp-remote plugin if it isn't installed.    
      become: true
      apt:
        name: audispd-plugins
        state: present
      register: install_pkg

    - name: Set the audisp-remote plugin as active.
      lineinfile:
        path: "{{ target_file }}"
        owner: root
        group: root
        mode: 0600
        state: present
        create: yes
        regexp: '^(.*)active(.*)$'
        line: active = yes
      register: file_updated

    - name: set audisp-remote plugin to send audit logs to a different system
      # use AWS CloudWatch to store logs remotely
      lineinfile:
        path: /etc/audisp/audisp-remote.conf
        owner: root
        group: root
        state: present
        create: no
        regexp: 'remote_server.*'
        line: 'remote_server = 127.0.0.1'
      register: remote      


    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated.changed | bool
        - remote.changed | bool

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes