---

- set_fact:
    stig_id: V-238314
    stig_text: "FAILED. Ubuntu does not generate audit record when loading dynamic kernel modules."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238314' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep -iw 'delete_module'
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: add/update "delete_module" 64-bit rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64 -S delete_module.*-k(.*)$'
        line: always,exit -F arch=b64 -S delete_module -k modules
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_auid1000

    - set_fact:
        stig_text: "PASSED"
      when: file_updated_auid1000.failed == false  

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
     

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

