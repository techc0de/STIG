---

- set_fact:
    stig_id: V-238322
    stig_text: "FAILED. Ubuntu does not generate records for successful/unsuccessful uses of delete_module syscall."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-238322' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | egrep delete_module
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find(#) == -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S delete_module -F key=modules') != -1
        fail_msg: Audit Rules Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the Ubuntu operating system to generate an audit event for any use of the delete_module system call for 64-bit rule.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b64.*delete_module.*-F(.*)$'
        line: -a always,exit -F arch=b64 -S delete_module -F key=modules
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_64_bit

    - name: Configure the Ubuntu operating system to generate an audit event for any use of the delete_module system call for 32-bit rule.
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)arch=b32.*delete_module.*-F(.*)$'
        line: -a always,exit -F arch=b32 -S delete_module -F key=modules
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated_32_bit
      
    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_updated_64_bit.failed == false
        - file_updated_32_bit.failed == false

    - name: reload the rules file
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

