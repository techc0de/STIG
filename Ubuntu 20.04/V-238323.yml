---

- set_fact:
    stig_id: V-238323
    stig_text: "FAILED. Ubuntu does notlimit the number of concurrent sessions to ten for all accounts and/or account types."
    target_file: /etc/security/limits.conf
     
- local_action: lineinfile regexp='^V-238323' path="{{ output_path }}" state=absent

- name: Check for config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Verify that the Ubuntu operating system limits the number of concurrent sessions to ten for all accounts and/or account types.
      shell:  grep '^* hard maxlogins 10' {{ target_file }} 
      register: audit_check
      failed_when: audit_check.rc != 0

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:
 
    - name: Configure the Ubuntu operating system to limit the number of concurrent sessions to ten for all accounts and/or account types.
      lineinfile:
        path: "{{ target_file }}"
        state: present
        insertbefore: BOF
        regexp: '^(.*)maxlogins(.*)$'
        line: '* hard maxlogins 10'
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

