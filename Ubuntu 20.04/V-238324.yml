---

- set_fact:
    stig_id: V-238324
    stig_text: "FAILED. Ubuntu does not monitor remote access methods."
    target_file: /etc/rsyslog.d/50-default.conf

- local_action: lineinfile regexp='^V-238324' path="{{ output_path }}" state=absent

- name: Verify that the Ubuntu operating system monitors all remote access methods.
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: Check that remote access methods are being logged.
      shell: grep -E -r '^(auth,authpriv\.\*|daemon\.\*)' /etc/rsyslog.*
      register: audit_check
      failed_when: audit_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: create "{{ target_file }}" if it doesn't exist
      become: true
      file:
        path: "{{ target_file }}"
        state: touch 

    - name: remove any previous logging configuation
      become: true
      replace:
        path: "{{ target_file }}"
        regexp: >
          ^\#*\s*{{ item }}\..*
      with_items:
        - 'auth'
        - 'authpriv'
        - 'daemon'
 
    - name: Configure the Ubuntu operating system to monitor all remote access methods.
      lineinfile:
        path: "{{ target_file }}"
        line: |
          auth.*,authpriv.* /var/log/secure
          daemon.notice /var/log/messages
        state: present 
      register: file_updated

    - name: restart rsyslog service
      service:
        name: rsyslog
        state: restarted

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

