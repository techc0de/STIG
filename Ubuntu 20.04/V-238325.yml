---

- set_fact:
    stig_id: V-238325
    stig_text: "FAILED. Ubuntu does not encrypt all stored passwords with a FIPS 140-2 approved cryptographic hashing algorithm."
    target_file: /etc/login.defs

- local_action: lineinfile regexp='^V-238325' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: grep -i encrypt_method "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0 or audit_check.stdout_lines.find('SHA512') != -1

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: remove any existing encrypt method rules from the file.      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)ENCRYPT_METHOD(.*)$'
        state: absent
        create: yes
        backup: yes

    - name: Configure the Ubuntu operating system to encrypt all stored passwords.
      lineinfile:
        path: "{{ target_file }}"
        line: ENCRYPT_METHOD SHA512 
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated
  
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
