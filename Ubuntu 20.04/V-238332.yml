---

- set_fact:
    stig_id: V-238332
    stig_text: "FAILED. Shell cmd found public directories without a sticky bit set."

- local_action: lineinfile regexp='^V-238332' path="{{ output_path }}" state=absent

- name: verify that all world-writable directories have the sticky bit set.
  block: 

    - name: check if any world-writable directories have the sticky bit set
      become: true
      shell: find / -type d -perm -002 ! -perm -1000
      register: no_bit
      failed_when: no_bit.stdout | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: set the sticky bit on all world writable directories.
      become: true
      file:
        path: "{{ item }}"
        state: directory
        mode: 1777
      with_items: "{{ no_bit.stdout_lines }}"
      register: sticky

    - set_fact:
        stig_text: "PASSED"
      when: sticky.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes