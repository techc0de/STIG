---

- set_fact:
    stig_id: V-238348
    stig_text: "FAILED. Ubuntu system library directories don't have mode 0755 or less permissive."

- local_action: lineinfile regexp='^V-238348' path="{{ output_path }}" state=absent

- name: Verify the system-wide shared library directories have mode 0755 or less permissive.
  block: 
    - name: check the shared library directories octal bits.
      become: true
      shell: find /lib /lib64 /usr/lib -perm /022 -type d -exec stat -c "%n %a" '{}' \;
      register: lib_files
      failed_when: lib_files.stdout | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the shared library directories to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        mode: 0755
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







