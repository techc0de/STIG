---

- set_fact:
    stig_id: V-238350
    stig_text: "FAILED. Ubuntu system library files aren't owned by root."

- local_action: lineinfile regexp='^V-238350' path="{{ output_path }}" state=absent

- name: Verify the system-wide shared library directories have mode 0755 or less permissive.
  block: 
    - name: check the shared library directories octal bits.
      become: true
      shell: find /lib /usr/lib /lib64 ! -user root -type d -exec stat -c "%n %U" '{}' \;
      register: lib_files
      failed_when: lib_files.stdout | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the system library files to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        owner: root
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







