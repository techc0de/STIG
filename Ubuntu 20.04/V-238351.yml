---

- set_fact:
    stig_id: V-238351
    stig_text: 'FAILED. The Ubuntu operating system library files must be group-owned by root.'

- local_action: lineinfile regexp='^V-238351' path="{{ output_path }}" state=absent

- name: verify that the "{{ target_file }}" file is exist.
  block: 

    - name: verify the target files
      become: true
      stat:
        path: "{{ item }}"
      loop:
        - /lib/
        - /usr/lib/
        - /lib64/
      register: files

    - name: Verify the following files are group-owned by root.
      loop: |
        {{ files.results | map(attribute='item')
        | zip(files.results | map(attribute='stat.mode'))
        | list }}

      assert:
        that: item.1 == 'root'
      loop_control:
        label: "{{ item.0 }}"

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: set system library files to be group-owned by root.
      become: true
      file:
        path: "{{ item.item }}"
        group: root
        state: "{{ 'file' if item.stat.exists else 'touch' }}"
      loop: "{{ files.results }}"
      register: file_perms_rule 
  
    - set_fact:
        stig_text: "PASSED"
      when: file_perms_rule.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
