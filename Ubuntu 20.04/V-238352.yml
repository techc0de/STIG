---

- set_fact:
    stig_id: V-238352
    stig_text: "FAILED. Ubuntu system library directories aren't group-owned by root."

- local_action: lineinfile regexp='^V-238352' path="{{ output_path }}" state=absent

- name: Verify the system-wide shared library directories are group-owned by root.
  block: 
    - name: check the shared library directories octal bits.
      become: true
      shell: find /lib /usr/lib /lib64 ! -group root -type d -exec stat -c "%n %G" '{}' \;
      register: lib_files
      failed_when: lib_files.stdout | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Configure the system library directories to be group-owned by root.
      become: true
      file:
        path: "{{ item }}"
        group: root
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







