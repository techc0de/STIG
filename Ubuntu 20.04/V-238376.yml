---

- set_fact:
    stig_id: V-238376
    stig_text: "FAILED. Ubuntu doesn't have system commands set to a mode of 0755 or less permissive."

- local_action: lineinfile regexp='^V-238376' path="{{ output_path }}" state=absent

- name: Verify the system commands contained in the following directories have mode 0755 or less permissive.
  block: 

    - name: check if system commands have 0755 mode or less permissive
      shell: find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin -perm /022 -type f -exec stat -c "%n %a" '{}' \;
      register: check_files
      failed_when: check_files.stdout | length > 0
    - set_fact:
        stig_text: "PASSED"

  rescue:
     
    - name: configure the system commands to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        mode: 0755
        state: touch
      with_items: "{{ check_files.stdout_lines }}"
      register: file_perms
  
    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
