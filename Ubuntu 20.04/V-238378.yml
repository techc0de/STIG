---

- set_fact:
    stig_id: V-238378
    stig_text: 'FAILED. Ubuntu does not have system commands group-owned by root.'

- local_action: lineinfile regexp='^V-238378' path="{{ output_path }}" state=absent

- name: Ensure system directories are own by root group.
  block: 
    - name: check that the system command files are group-owned by "root"
      become: true
      shell: find -L /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -group root -type f -exec stat -c "%n %G" '{}' \;
      register: lib_files
      failed_when: lib_files.rc != 0 or lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the system commands to be protected from unauthorized access.
      become: true
      shell: find /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin ! -group root -type f ! -perm /2000 -exec chgrp root '{}' \;
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes