---

- set_fact:
    stig_id: V-238380
    stig_text: "FAILED. Ubuntu doesn't disable the x86 Ctrl-Alt-Delete key sequence."
    target_file: /etc/systemd/system/ctrl-alt-del.target

- local_action: lineinfile regexp='^V-238380' path="{{ output_path }}" state=absent

- name: Verify the Ubuntu operating system is not configured to reboot the system when Ctrl-Alt-Delete is pressed.
  block: 

    - name: Check that the "ctrl-alt-del.target" isn't active.
      shell: "systemctl status ctrl-alt-del.target | awk -F: '/inactive/ {print $2}'"
      register: control_check
      failed_when: control_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - stat:
        path: "{{ target_file}}"
      register: link

    - name: remove symlink
      become: true
      file:
        path: "{{ target_file }}"
        state: absent
      when: link.stat.islnk is defined and link.stat.islnk

    - name: Disable the Ctrl-Alt-Delete sequence command.    
      become: true
      shell: systemctl mask ctrl-alt-del.target
      register: disable_cad

    - name: reload the daemon
      become: true
      shell: systemctl daemon-reload
      register: reload
  
    - set_fact:
        stig_text: "PASSED"
      when: disable_cad.rc == 0

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



