---

- set_fact:
    stig_id: V-75391

- local_action: lineinfile regexp='^V-75391' path="{{ output_path }}" state=absent

- name: update apt cache and install update notifier
  become: true
  apt:
    name: update-notifier-common
    state: present
    update_cache: yes
    cache_valid_time: 3600

# this requires package update-notifier-common be installed
- shell: "/usr/lib/update-notifier/apt-check"
  register: update_check

- set_fact:
    security_update: "{{ update_check.stderr | regex_search(security_int)}}"
    update_required: "{{ update_check.stderr | regex_search(update_int)}}"

- set_fact:
    stig_text: "{{ stig_id }} PASSED"
  when: security_update == ";0"

- set_fact:
    stig_text: "{{ stig_id }} FAILED. Found {{ security_update }} security updates."
  when: security_update != ";0"

- local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes