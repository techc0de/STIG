---

- set_fact:
    stig_id: V-75435

- local_action: lineinfile regexp='^V-75435' path="{{ output_path }}" state=absent

- name: truncate issue file
  become: true
  command: truncate -s 0 /etc/issue

- name: update ssh banner
  become: true
  lineinfile:
    path: /etc/issue
    create: yes
    line: | 
      You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only.

      By using this IS (which includes any device attached to this IS), you consent to the following conditions:

          - The USG routinely intercepts and monitors communications on this IS for
          purposes including, but not limited to, penetration testing, COMSEC
          smonitoring, network operations and defense, personnel misconduct (PM), law
          enforcement (LE), and counterintelligence (CI) investigations.

          - At any time, the USG may inspect and seize data stored on this IS.

          - Communications using, or data stored on, this IS are not private, are
          subject to routine monitoring, interception, and search, and may be disclosed
          or used for any USG-authorized purpose.

          - This IS includes security measures (e.g., authentication and access controls)
          to protect USG interests--not for your personal benefit or privacy.

          - Notwithstanding the above, using this IS does not constitute consent to PM,
          LE or CI investigative searching or monitoring of the content of privileged
          communications, or work product, related to personal representation or services
          by attorneys, psychotherapists, or clergy, and their assistants. Such
          communications and work product are private and confidential. See User
          Agreement for details.

- name: remove issue.net
  become: true
  file:
    path: /etc/issue.net
    state: absent

- name: link issue as issue.net
  become: true
  file:
    src: /etc/issue
    dest: /etc/issue.net
    state: link

- name: gather information about all motd files
  find:
    paths: /etc/update-motd.d
  register: motd_file_list

- name: disable all motd files
  become: true
  file: 
    path: "{{ item.path }}"
    mode: -x
  loop: "{{ motd_file_list.files }}"

- name: update ssh_conf to load banner file
  become: true
  lineinfile:
    path: /etc/ssh/sshd_config
    line: Banner /etc/issue.net

- name: check banner message config
  block: 

    - stat:
        path: /etc/issue
      register: issue_file

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. Issue file not found."
      when: issue_file.stat.exists == False

    - command: /bin/false
      when: issue_file.stat.exists == False

    - command: grep "You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only" /etc/issue
      register: issue_check

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. /etc/issue file does not contain banner text."
      when: issue_check.stdout.find('You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only') == -1

    - command: /bin/false
      when: issue_check.stdout.find('You are accessing a U.S. Government (USG) Information System (IS) that is provided for USG-authorized use only') == -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

    - name: restart sshd
      become: true
      service:
        name: sshd
        state: restarted

  rescue:

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes