---

- set_fact:
    stig_id: V-75441

- local_action: lineinfile regexp='^V-75441' path="{{ output_path }}" state=absent

- stat:
    path: /etc/profile.d/autologout.sh
  register: logout_file

- name: check auto-logout configuration
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. auto-logout file does not exist."
      when: logout_file.stat.exists == False

    - command: /bin/false
      when: logout_file.stat.exists == False

    - set_fact:
        contents: "{{ lookup('file', '/etc/profile.d/autologout.sh') }}"

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. Could not read auto-logout file content."
      when: contents is not defined
      
    - command: /bin/false
      when: contents is not defined

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. Timeout not properly configured."
      when: contents.find("TMOUT=900") == -1 or contents.find("readonly TMOUT") == -1 or contents.find("export TMOUT") == -1

    - command: /bin/false
      when: contents.find("TMOUT=900") == -1 or contents.find("readonly TMOUT") == -1 or contents.find("export TMOUT") == -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: Configure timeout
      become: true
      lineinfile:
        path: /etc/profile.d/autologout.sh
        create: yes
        state: present
        mode: +x
        line: |
          TMOUT=900
          readonly TMOUT
          export TMOUT
      register: config_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: config_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes