---

- set_fact:
    stig_id: V-75469

- local_action: lineinfile regexp='^V-75469' path="{{ output_path }}" state=absent

- name: check that password complexity requires at least 1 special character
  block: 

    - name: ensure root password does not expire
      become: true
      shell: "chage -l root | grep -i ^password | grep -i expires | cut -d: -f2 | tr -d ' '"
      register: expiry_check

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. root password has an expiry"
      when: expiry_check.stdout != "never"

    - command: /bin/false
      when: expiry_check.stdout != "never"
      
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: remove root password expiration date
      become: true
      shell: chage -I -1 -m 0 -M 99999 -E -1 root
      register: expiry_updated
      failed_when: expiry_updated.rc == 2 or expiry_updated.rc == 3

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: expiry_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
