---

- set_fact:
    stig_id: V-75471

- local_action: lineinfile regexp='^V-75471' path="{{ output_path }}" state=absent

- stat:
    path: /etc/login.defs
  register: login_file

- name: check that password min days set to a value equal to or greater than 1 day
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pw policy definition file does not exist."
      when: login_file.stat.exists == False

    - command: /bin/false
      when: login_file.stat.exists == False

    - shell: 'grep -i "^pass_min_days\s*[0-9]" /etc/login.defs'
      register: min_check
      failed_when: min_check.rc == 2 or min_check.rc == 3

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. PASS_MIN_DAYS parameter is not set in th /etc/login.defs file."
      when: min_check.rc == 1

    - command: /bin/false
      when: min_check.rc == 1

    - name: update PASS_MIN_DAYS param in /etc/login.defs
      become: true
      lineinfile:
        path: /etc/login.defs
        regexp: '^PASS_MIN_DAYS'
        line: "PASS_MIN_DAYS\t1"
      register: min_updated
      when: min_check.stdout | regex_search('([0-9]+$)') | default('0') | int < 1

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. PASS_MIN_DAYS parameter is not set in th /etc/login.defs file."
      when: min_updated.failed is defined and min_updated.failed == true
      
    - command: /bin/false
      when: min_updated.failed is defined and min_updated.failed == true

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: add PASS_MIN_DAYS param in /etc/login.defs
      become: true
      lineinfile:
        path: /etc/login.defs
        line: "PASS_MIN_DAYS\t1"
      register: min_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: min_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
