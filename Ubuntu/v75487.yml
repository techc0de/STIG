---

- set_fact:
    stig_id: V-75487
    target_file: /etc/pam.d/common-auth

- local_action: lineinfile regexp='^V-75487' path="{{ output_path }}" state=absent

- stat:
    path: "{{ target_file }}"
  register: pw_file

- name: configure os to lock account after 3 failed login attempts. 
  block: 

    - set_fact:
        stig_text: "FAILED. pam.d common-auth file does not exist."
      when: pw_file.stat.exists == False

    - command: /bin/false
      when: pw_file.stat.exists == False

    - shell: grep '^auth.*pam_tally' "{{ target_file }}"
      register: pw_check
      failed_when: pw_check.rc == 2 or pw_check.rc == 3

    - set_fact:
        stig_text: "FAILED. pam_tally module is not enabled."
      when: pw_check.rc == 1

    - command: /bin/false
      when: pw_check.rc == 1
      
    - set_fact:
        stig_text: "FAILED. onerr=fail deny=3 is not used in pam.d/common-auth."
      when: 
        - pw_check.stdout.find('onerr=fail') == -1
        - pw_check.stdout.find('deny=3') == -1

    - command: /bin/false
      when:
        - pw_check.stdout.find('onerr=fail') == -1
        - pw_check.stdout.find('deny=3') == -1

    - set_fact:
        stig_text: "FAILED. unlock_time is configured and must be removed from pam.d/common-auth."
      when: pw_check.stdout.find('unlock_time') != -1

    - name: remove any detected instance of unlock_time
      become: true
      lineinfile:
        path: "{{ target_file }}"
        regexp: '(.*)unlock_time(.*)'
        line: '\1\2'
        backrefs: yes
      register: removed_unlock

    - command: /bin/false
      when: pw_check.stdout.find('unlock_time') != -1 and removed_unlock.

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - shell: egrep -i '^auth\s+(\[success.*\])\s+pam_pkcs11.so.*' "{{ target_file }}" | grep -o '\[.*\]'
      register: control

    - shell: egrep -i '^auth\s+(\[success.*\])\s+pam_pkcs11.so.*' "{{ target_file }}" | grep -o 'pam.*.so'
      register: module

    - name: enable pam_tally module
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-auth
        type: auth
        control: "{{ control.stdout | default('[success=1 default=ignore]') }}"
        module_path: "{{ module.stdout | default('pam_unix.so') }}"
        new_type: auth
        new_control: required
        new_module_path: pam_tally2.so
        module_arguments: 'file=/var/log/tallylog onerr=fail deny=3'
        state: before
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: enable pam_tally reset
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-account
        type: account
        control: 'required'
        module_path: pam_permit.so
        new_type: account
        new_control: required
        new_module_path: pam_tally2.so
        # module_arguments: 'reset no_magic_root' #these are not supported by pam_tally2
        state: before


  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
