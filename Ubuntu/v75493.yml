---

- set_fact:
    stig_id: V-75493

- local_action: lineinfile regexp='^V-75493' path="{{ output_path }}" state=absent

- stat:
    path: /etc/pam.d/common-auth
  register: pw_file

- name: verify the os enforces a delay of at least 4 seconds between logon prompts
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pam.d common-auth file does not exist."
      when: pw_file.stat.exists == False

    - command: /bin/false
      when: pw_file.stat.exists == False

    - shell: grep '^auth.*pam_faildelay' /etc/pam.d/common-auth
      register: pw_check
      failed_when: pw_check.rc == 2 or pw_check.rc == 3

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pam_faildelay module is not enabled."
      when: pw_check.rc == 1

    - command: /bin/false
      when: pw_check.rc == 1
      
    - set_fact:
        stig_text: "{{ stig_id }} FAILED. delay value invalid in /etc/pam.d/common-auth."
      when: pw_check.stdout.find('delay=4000000') == -1

    - command: /bin/false
      when: pw_check.stdout.find('delay=4000000') == -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: configure the os to enforce a delay of at least 4 seconds between logon promps following a failed logon attempt
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-auth
        type: auth
        control: requisite
        module_path: pam_deny.so
        new_type: auth
        new_control: required
        new_module_path: pam_faildelay.so
        module_arguments: 'delay=4000000'
        state: after
      register: config_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: config_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
