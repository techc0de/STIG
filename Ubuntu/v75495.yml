---

- set_fact:
    stig_id: V-75495

- local_action: lineinfile regexp='^V-75495' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. autologon via the GUI is enabled."
    dm_config_file: /etc/lightdm/lightdm.conf

- stat:
    path: "{{ dm_config_file }}"
  register: dm_file

- name: verify that unattended or automatic login via the GUI is disabled
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: dm_file.stat.exists == False

    - command: /bin/false
      when: dm_file.stat.exists == False

    - shell: grep '^autologin-user' "{{ dm_config_file }}"
      register: dm_check
      failed_when: dm_check.rc == 2 or dm_check.rc == 3

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: dm_check.rc == 1

    - command: /bin/false
      when: dm_check.rc == 1
    
    - name: disable autologon
      become: true
      replace:
        path: "{{ dm_config_file }}"
        regexp: '(^autologin\-user.*)'
        replace: '#\1'
      register: dm_config_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: dm_config_updated.failed == false

  rescue:

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
