---

- set_fact:
    stig_id: V-75503

- local_action: lineinfile regexp='^V-75503' path="{{ output_path }}" state=absent

- set_fact:
    target_file: /proc/sys/crypto/fips_enabled
    stig_text: "{{ stig_id }} FAILED. FIPS mode is not enabled"

- stat:
    path: "{{ target_file }}"
  register: fips_file

- name: check auto-logout configuration
  block: 

    - command: /bin/false
      when: fips_file.stat.exists == False

    - set_fact:
        contents: "{{ lookup('file', {{ target_file }}) }}"

    - command: /bin/false
      when: contents is not defined

    - command: /bin/false
      when: contents.find("1") == -1 

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes