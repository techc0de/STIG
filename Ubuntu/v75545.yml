---

- set_fact:
    stig_id: V-75545
    stig_text: "FAILED. system has unnecessary accounts"
    check_list: "{{ linux_admin_user_list }}"
    bad_list: []

- local_action: lineinfile regexp='^V-75545' path="{{ output_path }}" state=absent

- name: verify all accounts on the system are assigned to an active system, application, or user account
  block:

    - name: get system user list
      become: true
      shell: cat /etc/shadow | egrep '^[a-z]*:+[^\*\!]' | cut -d ":" -f 1
      register: user_list

    - set_fact:
        check_list: "{{ linux_admin_user_list + linux_user_list }}"
      when: "'servers-development' in group_names"

    - name: check for users
      set_fact: 
        bad_list: "{{ bad_list + [ item ] }}"
      with_items: "{{ user_list.stdout_lines }}"
      when: "item not in check_list"

    - command: /bin/false
      when: bad_list|length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - set_fact: 
        stig_text: "FAILED. system contains unauthorized users accounts: {{ bad_list|join(', ') }}"

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_id }} {{stig_text}}" path="{{ output_path }}" create=yes

