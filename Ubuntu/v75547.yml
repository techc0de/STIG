---

- set_fact:
    stig_id: V-75547
    stig_text: "FAILED. os contains duplicate user ids for interactive users"

- local_action: lineinfile regexp='^V-75547' path="{{ output_path }}" state=absent

- name: verfiy that no duplicate user ids exist
  block:

    - shell: awk -F ":" 'list[$3]++{print $1, $3}' /etc/passwd
      register: dupe_check

    - command: /bin/false
      when: dupe_check.stdout != ""

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - set_fact:
        stig_text: "{{ stig_text }} ({{ dupe_check.stdout_lines | join(', ') }})"  

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

