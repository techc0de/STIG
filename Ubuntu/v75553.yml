---

- set_fact:
    stig_id: V-75553
    stig_text: "FAILED. PAM allows the use of cache authentications older than 1 day"

- local_action: lineinfile regexp='^V-75553' path="{{ output_path }}" state=absent

- name: verfiy that PAM prohibits the user of cached authentications after one day
  block:

    - name: check time out value
      become: true
      shell: grep -i "timestamp_timeout" /etc/pam.d/*
      register: pam_check
      failed_when: pam_check.rc == 1

    - command: /bin/false
      when: pam_check.stdout == ""

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure PAM to prohibit the use of cached authentications after one day
      become: true
      pamd:
        path: '/etc/pam.d/'
        name: common-session
        type: session
        control: 'required'
        module_path: pam_unix.so
        new_type: session
        new_control: optional
        new_module_path: pam_timestamp.so
        module_arguments: 'timestamp_timeout=86400'
        state: after
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

