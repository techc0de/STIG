---

- set_fact:
    stig_id: V-75563
    stig_text: "FAILED. os contains interactive users with missing home directories"
    bad_users: []

- local_action: lineinfile regexp='^V-75563' path="{{ output_path }}" state=absent

- name: verfiy the assigned home directory  of all interactive users on the os exist
  block: 

    - name: get list containing any user without a home directory
      become: true
      shell: > 
        ls -ld $(awk -F: '($3>=1000)&&($1!="nobody"){print $6}' /etc/passwd) | 
        grep -i 'no such file or directory'
      register: dirs
      failed_when: dirs.rc == 2 or dirs.rc == 3

    - command: /bin/false
      when: dirs.stderr_lines is defined and dirs.stderr_lines | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - set_fact: 
        stig_text: "{{ stig_text }}: {{ dirs.stderr_lines|join(', ') }}"

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes