---

- set_fact:
    stig_id: V-75565
    stig_text: "FAILED. os has interactive user directories with mode more permissive than 0750"
    bad_dirs: []

- local_action: lineinfile regexp='^V-75565' path="{{ output_path }}" state=absent

- name: verfiy the assigned home directory  of all interactive users HAS A MODE OF "0750" or less permissive
  block: 

    - name: get a list of interactive user directories
      become: true
      shell: > 
        ls -ld $(awk -F: '($3>=1000)&&($1!="nobody"){print $6}' /etc/passwd)
      register: dirs
      failed_when: dirs.rc == 2 or dirs.rc == 3

    - set_fact:
        bad_dirs: "{{ bad_dirs + [ item ] }}"
      with_items: "{{ dirs.stdout_lines }}"
      when: "item.find('drwxr-x---') == -1"

    - command: /bin/false
      when: bad_dirs | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change directory modes
      become: true
      file:
        path: "{{ item.split(' ')|last }}"
        state: directory
        mode: '0750'
      with_items: "{{ bad_dirs }}"

    - name: get a list of interactive user directories
      become: true
      shell: > 
        ls -ld $(awk -F: '($3>=1000)&&($1!="nobody"){print $6}' /etc/passwd)
      register: dirs
      failed_when: dirs.rc == 2 or dirs.rc == 3

    - set_fact:
        bad_dirs: "{{ bad_dirs + [ item ] }}"
      with_items: "{{ dirs.stdout_lines }}"
      when: "item.find('drwxr-x---') == -1"

    - set_fact:
        stig_text: "PASSED"
      when: bad_dirs | length == 0

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes