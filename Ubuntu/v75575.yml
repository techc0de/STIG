---

- set_fact:
    stig_id: V-75575
    stig_text: "FAILED. nosuid option not set on /home mount"

- local_action: lineinfile regexp='^V-75575' path="{{ output_path }}" state=absent

- name: check nosuid on /home mount
  block: 

    - shell: "grep /home /etc/fstab"
      register: home_check
      failed_when: home_check.rc == 0 and home_check.stdout.find('nosuid') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:
    
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
