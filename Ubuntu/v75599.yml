---

- set_fact:
    stig_id: V-75599
    stig_text: 'FAILED. the "/var/log/syslog" file is not group owned by adm'
    target_file: /var/log/syslog

- local_action: lineinfile regexp='^V-75599' path="{{ output_path }}" state=absent

- name: verify the "/var/log/syslog" file is group-owned by adm
  block: 

    - shell: ls -la "{{ target_file }}" | cut -d' ' -f4
      register: perms
      failed_when: perms.stdout != 'adm'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the group of the "/var/log/syslog" file to "adm"
      become: true
      shell: chgrp adm "{{ target_file }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.rc == 0

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
