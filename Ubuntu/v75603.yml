---

- set_fact:
    stig_id: V-75603
    stig_text: 'FAILED. the "/var/log/syslog" file does not have mode "0640" or less permissive.'
    target_file: /var/log/syslog

- local_action: lineinfile regexp='^V-75603' path="{{ output_path }}" state=absent

- name: verify that the "/var/log/syslog" file has mode "0640" or less permissive
  block: 

    - name: check syslog
      become: true
      shell: stat -c "%a %n" /var/log/syslog | cut -d ' ' -f 1
      register: file_perm
      failed_when: file_perm.rc != 0 or file_perm.stdout != '640'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the permissions of the file "/var/log/syslog" to "0640".
      become: true
      file:
        path: "{{ target_file }}"
        mode: 0640
        state: touch
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
