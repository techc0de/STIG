---

- set_fact:
    stig_id: V-75617
    stig_text: "FAILED. audit service is not active."

- local_action: lineinfile regexp='^V-75617' path="{{ output_path }}" state=absent

- name: verify the audit service is configured to produce audit records.
  block: 

    - name: check for package
      shell: dpkg -l | grep auditd
      register: package_check
      failed_when: package_check.stdout.find('ii  auditd') == -1

    - shell: systemctl status auditd
      register: service_check
      failed_when: service_check.stdout.find('running') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: check that the audit service is installed properly
      become: true
      apt:
        name: auditd
        state: present
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_virtualization_role == "host"
        
    - name: attempt to start the service
      become: true
      shell: service auditd start
      register: service_check
      ignore_errors: yes

    - set_fact:
        stig_text: "PASSED"
      when: service_check.rc == 0

    - name: attempt to enable the service
      become: true
      shell: service auditd enable
      ignore_errors: yes
      when: service_check.rc == 0

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes