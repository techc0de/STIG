---

- set_fact:
    stig_id: V-75621
    stig_text: 'FAILED. the os does not allocate audit record storage capacity to store at least one weeks worth of audit records'
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-75621' path="{{ output_path }}" state=absent

- name: verify the os allocates audit record storage capacity to store at least one week's worth of audit records
  block: 

    - name: check for the target file
      become: true
      stat:
        path: "{{ target_file }}"
      register: config_file
      failed_when: config_file.stat.exists == false

    - name: get path of audit log file
      become: true
      shell: grep -w '^log_file' "{{ target_file }}"
      register: log_file_param
      failed_when: log_file_param.stdout == ""

    - set_fact:
        log_file_path: "{{ log_file_param.stdout.split('=')[1]|trim }}"

    - name: determine the size of the partition where the audit log is being stored
      become: true
      shell: df | grep $(dirname "{{ log_file_path }}") | awk '{print $2}'
      register: partition_size
      failed_when: partition_size.rc != 0 or partition_size.stdout | int < 10240 

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
