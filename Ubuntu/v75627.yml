---

- set_fact:
    stig_id: V-75627
    stig_text: "FAILED. os is not alerting SA and ISSO when the audit storage volume is full"
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-75627' path="{{ output_path }}" state=absent

- name: verify that the SA and ISSO are notified when the audit storage volume is full
  block: 

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: audit_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: audit_file.stat.exists == False

    - name: check for max_log_file_action in audit config file
      become: true
      shell: grep '^max_log_file_action.*' "{{ target_file }}"
      register: file_check
      failed_when: file_check.rc == 2 or file_check.rc == 3

    - command: /bin/false
      when: file_check.stdout.find('syslog') == -1 and file_check.stdout.find('keep_logs') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure os to notify the SA and ISSO when the audit storage volume is full
      become: true
      lineinfile:
        path: "{{ target_file }}"
        create: yes
        owner: root
        group: root
        state: present
        regexp: '^\#*\s*max\_log\_file\_action.*'
        line: max_log_file_action = syslog
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
