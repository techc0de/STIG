---

- set_fact:
    stig_id: V-75629
    stig_text: "FAILED. os is not taking appropriate action when audit storage is full"
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-75629' path="{{ output_path }}" state=absent

- name: verify the os takes the appropriate action when the audit storage volume is full
  block: 

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: audit_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: audit_file.stat.exists == False

    - name: check for disk_full_action in audit config file
      become: true
      shell: grep '^disk_full_action.*' "{{ target_file }}"
      register: file_check
      failed_when: file_check.rc == 2 or file_check.rc == 3

    - command: /bin/false
      when: file_check.stdout.find('HALT') == -1 and file_check.stdout.find('SYSLOG') == -1 and file_check.stdout.find('SINGLE') == -1
      
    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure os to shutdown by default upon audit failure
      become: true
      lineinfile:
        path: "{{ target_file }}"
        create: yes
        owner: root
        group: root
        state: present
        regexp: '^\#*\s*disk\_full\_action.*'
        line: disk_full_action = HALT
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
