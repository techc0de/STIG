---

- set_fact:
    stig_id: V-75637
    stig_text: "FAILED. the audit log directories have invalid permissive mode."
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-75637' path="{{ output_path }}" state=absent

- name: verify the audit log directories have a mode of "0750" or less permissive
  block:

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: audit_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: audit_file.stat.exists == False

    - name: determine log path
      become: true
      shell: grep -iw log_file "{{ target_file }}"
      register: path_param
      failed_when: path_param.stdout == ""

    - assert:
        that: 
          - path_param.stdout.find('#') == -1

    - set_fact:
        log_path: "{{ path_param.stdout.split('=')[1] | trim | dirname }}"

    - name: check log file mode 
      become: true
      shell: stat -c "%a %n" "{{ log_path }}"
      register: log_stat

    - assert:
        that:
          - log_stat.stdout.split(' ')[0]|trim == "750"
        fail_msg: invalid mode on log file directory

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the audit log directories to be protected from unauthorized read access by setting the correct permissive mode
      become: true
      file:
        path: "{{ log_path }}"
        owner: root
        group: root
        state: directory
        mode: 0750
      when: log_path is defined
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: log_path is defined and file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
