---

- set_fact:
    stig_id: V-75649
    stig_text: 'FAILED. the audit log files are not owned by "root"'
    target_file: /etc/audit/auditd.conf
    default_log_file_path: /var/log/audit/audit.log

- local_action: lineinfile regexp='^V-75649' path="{{ output_path }}" state=absent

- name: verify the audit log files are owned by "root"
  block: 

    - name: check for the target file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: audit_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: audit_file.stat.exists == False


    - name: check where the audit logs are stored on the system
      block:

        - name: check where the audit logs are stored on the system
          become: true
          shell: grep -w '^log_file' "{{ target_file }}"
          register: log_file_param
          failed_when: log_file_param.stdout == ""

        - set_fact:
            log_file_path: "{{ log_file_param.stdout.split('=')[1]|trim }}"

      rescue:

        - name: add log_file param to audit config file
          become: true
          lineinfile:
            path: "{{ target_file }}"
            regexp: '^#*\s*log_file\s.*'
            line: log_file = "{{ default_log_file_path }}"
            create: true
            owner: root
            group: root
            mode: 0644

        - set_fact:
            log_file_path: "{{ default_log_file_path }}"


    - name: get the owner of the audit log file
      become: true
      shell: ls -la "{{ log_file_path }}" | cut -d" " -f3
      register: file_owner
      ignore_errors: true
      failed_when: file_owner.stdout != 'root'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the owner of the audit log file
      become: true
      file:
        path: "{{ log_file_path }}"
        state: touch
        owner: root
        group: root
        mode: 660
      register: file_perms
      when: log_file_path is defined

    - set_fact:
        stig_text: "PASSED"
      when: 
        - file_perms.rc == 0
        - log_file_path is defined

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
