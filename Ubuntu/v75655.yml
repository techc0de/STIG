---

- set_fact:
    stig_id: V-75655
    stig_text: 'FAILED. the audit tool files are not owned by "root"'

- local_action: lineinfile regexp='^V-75655' path="{{ output_path }}" state=absent

- name: verify the audit tools are owned by "root" to prevent any unauthorized access, deletion, or modification
  block:

    - name: find libary file not owned by root
      become: true
      shell: >
        find /sbin
        -type f \(
        -name "auditctl"
        -o -name "aureport"
        -o -name "ausearch"
        -o -name "autrace"
        -o -name "auditd"
        -o -name "audispd"
        -o -name "augenrules"
        \) ! -user root
      register: lib_files
      failed_when: lib_files.rc != 0 or lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the audit tool files to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        owner: root
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
