---

- set_fact:
    stig_id: V-75657
    stig_text: 'FAILED. the library files are not group-owned by "root"'

- local_action: lineinfile regexp='^V-75657' path="{{ output_path }}" state=absent

- name: verify the system-wide shared library files are group-owned by "root"
  block: 

    - name: find libary file not owned by root
      become: true
      shell: >
        find /sbin
        -type f \(
        -name "auditctl" 
        -o -name "aureport" 
        -o -name "ausearch" 
        -o -name "autrace"
        -o -name "auditd" 
        -o -name "audispd" 
        -o -name "augenrules" 
        \) ! -group root
      register: lib_files
      failed_when: lib_files.rc != 0 or lib_files.stdout != ''

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the library files to be protected from unauthorized access.
      become: true
      file:
        path: "{{ item }}"
        group: root
        state: touch
      with_items: "{{ lib_files.stdout_lines }}"
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
