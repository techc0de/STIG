---

- set_fact:
    stig_id: V-75695
    stig_text: 'FAILED. the OS does not generate audit records for successful/unsuccessful uses of the "mount" command'
    target_file: /etc/audit/audit.rules

- local_action: lineinfile regexp='^V-75695' path="{{ output_path }}" state=absent

- name: Successful/unsuccessful uses of the mount command must generate an audit record.
  block: 

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - fail:
        msg: "{{ stig_text }}"
      when: rules_file.stat.exists == False

    - name: check for audit rules param
      become: true
      shell: "grep -w /bin/mount {{ target_file }}"
      register: audit_check
      failed_when: audit_check.stdout != '-a always,exit -F path=/bin/mount -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged-mount'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure OS to generate audit records for successful/unsuccessful uses of the "mount" command
      become: true
      lineinfile:
        path: "/etc/audit/rules.d/mount.rules"
        line: -a always,exit -F path=/bin/mount -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged-mount
        create: yes
        owner: root
        group: root
        mode: 0640
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart audit service 
      become: true
      shell: systemctl restart auditd.service
      ignore_errors: yes

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
