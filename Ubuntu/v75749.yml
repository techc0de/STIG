---

- set_fact:
    stig_id: V-75749
    stig_text: "FAILED. os does not generate audit record when attempts to user 'creat' command occur."
    target_file: /etc/audit/audit.rules

- local_action: lineinfile regexp='^V-75749' path="{{ output_path }}" state=absent

- name: verify the os generates an audit record when attempts to use the "creat" command occur.
  block:

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - command: /bin/false
      when: rules_file.stat.exists == False

    - name: check for audit rules
      become: true
      shell: grep -iw creat "{{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc == 1 or audit_check.rc == 3

    - assert:
        that: 
          - audit_check.stdout.find('#') == -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S creat -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access') != -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S creat -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access') != -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "creat" command.
      become: true
      lineinfile:
        path: "/etc/audit/rules.d/creat.rules"
        create: yes
        owner: root
        group: root
        state: present
        line: |
          -a always,exit -F arch=b64 -S creat -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access
          -a always,exit -F arch=b64 -S creat -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
