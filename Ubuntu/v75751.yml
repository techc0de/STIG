---

- set_fact:
    stig_id: V-75751
    stig_text: 'FAILED. the os is not configured to audit the execution of the "openat" system call'
    target_file: /etc/audit/audit.rules

- local_action: lineinfile regexp='^V-75751' path="{{ output_path }}" state=absent

- name: verify the os is configured to audit the execution of the "openat" system call
  block: 

    - name: check for the file
      become: true
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail: 
        msg: missing audit rules file
      when: rules_file.stat.exists == False

    - name: check for audit rules param
      become: true
      shell: "grep -iw openat {{ target_file }}"
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('#') == -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S openat -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access') != -1
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S openat -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access') != -1
        msg: AUDIT RULES NOT CONFIGURED

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove any existing "openat" rules from audit file
      become: true
      lineinfile:
        path: "/etc/audit/rules.d/openat.rules"
        regexp: '^.*\sopenat\s.*'
        state: absent
        create: yes

    - name: configure the Ubuntu operating system to audit the execution of the 'openat' system call, by adding the following lines to '/etc/audit/audit.rules'
      become: true
      lineinfile:
        path: "/etc/audit/rules.d/openat.rules"
        line: |
          -a always,exit -F arch=b64 -S openat -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k perm_access
          -a always,exit -F arch=b64 -S openat -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k perm_access
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart audit service 
      become: true
      shell: systemctl restart auditd.service
      ignore_errors: yes

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
