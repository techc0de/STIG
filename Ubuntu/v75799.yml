---

- set_fact:
    stig_id: V-75799

- local_action: lineinfile regexp='^V-75799' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. nis package is installed"

- name: verfiy that the nis package is not installed
  block:

    - shell: dpkg -l | egrep '^ii\s+nis\s+'
      register: nis_check
      failed_when: nis_check.rc != 1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: remove the nis package
      become: true
      apt:
        name: nis
        state: absent
      register: remove_nis

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: remove_nis.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
