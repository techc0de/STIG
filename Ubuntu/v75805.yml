---

- set_fact:
    stig_id: V-75805
    stig_text: "FAILED. ufw not enabled at startup"

- local_action: lineinfile regexp='^V-75805' path="{{ output_path }}" state=absent

- name: check if UFW is enabled at startup
  block: 

    - shell: "systemctl is-enabled ufw"
      register: ufw_enabled_check
      failed_when: ufw_enabled_check.stdout.find('enabled') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:
    
    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
