---

- set_fact:
    stig_id: V-75807
    stig_text: "FAILED. ufw not enabled in default deny"

- local_action: lineinfile regexp='^V-75807' path="{{ output_path }}" state=absent

- name: check UFW rules
  block: 

    - name: check ufw status
      become: true
      shell: "ufw status verbose"
      register: ufw_enabled_check
      failed_when: ufw_enabled_check.stdout.find('deny (incoming)') == -1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
