---

- set_fact:
    stig_id: V-75811
    stig_text: "FAILED. found public directories without a sticky bit set."

- local_action: lineinfile regexp='^V-75811' path="{{ output_path }}" state=absent

- name: verify that all world writable directories have the sticky bit set.
  block: 

    - name: check to see that all world writable directories have the sticky bit set
      become: true
      shell: >
        find /
        \(
        -path "/sys"
        -o -path "/run"
        -o -path "/proc"
        -o -path "/media"
        -o -path "/var/lib/docker"
        -o -path "/var/lib/lxd"
        \) -prune 
        -o
        -type d
        \( -perm -0002 -a ! -perm -1000 \)
        -print 2>/dev/null 
      register: no_bit
      failed_when: no_bit.rc == 2 or no_bit.rc == 3

    - command: /bin/false
      when: no_bit.stdout_lines | length > 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: set the sticky bit on all world writable directories.
      become: true
      file:
        path: "{{ item }}"
        state: touch
        mode: 1777
      with_items: "{{ no_bit.stdout_lines }}"
      register: chewed

    - set_fact:
        stig_text: "PASSED"
      when: chewed.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes