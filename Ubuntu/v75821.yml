---

- set_fact:
    stig_id: V-75821
    stig_text: "FAILED. os is not implementing address space layout randomization"
    target_file: /etc/sysctl.conf

- local_action: lineinfile regexp='^V-75821' path="{{ output_path }}" state=absent

- name: verfiy the os implements address space layout randomization (ASLR)
  block: 

    - name: check current system configuation
      block:

        - name: query sysctl for randomize_va_space value
          become: true
          shell: sysctl kernel.randomize_va_space
          register: sysctl_check
          failed_when: sysctl_check.rc == 2 or sysctl_check.rc == 3

        - assert:
            that:
              - sysctl_check.stdout.find('kernel.randomize_va_space = 2') != -1

        - set_fact:
            stig_text: "PASSED"

      rescue:

        - name: check file system
          become: true
          shell: grep "kernel.randomize_va_space" /etc/sysctl.conf /etc/sysctl.d/*
          register: fs_check
          failed_when: fs_check.rc == 2 or fs_check.rc == 3

        - assert:
            that:
              fs_check.stdout.find('kernel.randomize_va_space = 2') != -1

        - set_fact:
            stig_text: "PASSED"

  rescue:

    - name: configure the os to implement virutal address space randomization
      become: true
      lineinfile:
        path: "{{ target_file }}"
        create: yes
        owner: root
        group: root
        state: present
        regexp: '^\#*\s*kernel\.randomize\_va\_space.*'
        line: kernel.randomize_va_space = 2
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
