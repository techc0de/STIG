---

- set_fact:
    stig_id: V-75823
    target_file: /etc/ssh/sshd_config

- local_action: lineinfile regexp='^V-75823' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. OS is not enforcing SSH2 for network access"

- stat:
    path: "{{ target_file }}"
  register: ssh_file

- name: verify the OS enforces SSH protocol 2 for network access.
  block:

    - command: /bin/false
      when: ssh_file.stat.exists == False

    - shell: egrep -i '^\s*protocol\s+2' "{{ target_file }}"
      register: shell_check
      failed_when: shell_check.rc != 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: configure OS to enforce SSHv2 for all network access 
      become: true
      lineinfile:
        path: "{{ target_file }}"
        line: Protocol 2
        regexp: '^#*\s*Protocol.*'
        state: present
      register: update_sshd

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: update_sshd.failed == false

    - debug:
        var: stig_text

    - name: restart sshd.service
      become: true
      service:
        name: sshd
        state: restarted

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
