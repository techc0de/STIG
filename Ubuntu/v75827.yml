---

- set_fact:
    stig_id: V-75827
    stig_text: "FAILED. root login via ssh is not disabled"
    target_file: /etc/ssh/sshd_config

- local_action: lineinfile regexp='^V-75827' path="{{ output_path }}" state=absent

- stat:
    path: "{{ target_file }}"
  register: ssh_file
    
- name: verify that root login via ssh is disabled.
  block:

    - command: /bin/false
      when: ssh_file.stat.exists == False

    - shell: grep 'PermitRootLogin no' "{{ target_file }}" | grep -v '^#'
      register: shell_check
      failed_when: shell_check.rc != 0

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: configure the SSH daemon to deny root login to the system 
      become: true
      lineinfile:
        path: "{{ target_file }}"
        line: PermitRootLogin no
        regexp: '^#*\s*PermitRootLogin.*'
        state: present
      register: set_root_login

    - set_fact:
        stig_text: "PASSED"
      when: set_root_login.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart sshd.service
      become: true
      service:
        name: sshd
        state: restarted

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
