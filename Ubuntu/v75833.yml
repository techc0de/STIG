---

- set_fact:
    stig_id: V-75833
    target_file: /etc/ssh/sshd_config

- local_action: lineinfile regexp='^V-75833' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. unattended or automatic login via ssh is not disabled"

- stat:
    path: "{{ target_file }}"
  register: ssh_file
    
- name: verify that unattended or automatic login via ssh is disabled.
  block:

    - command: /bin/false
      when: ssh_file.stat.exists == False

    - shell: egrep '^Permit(.*?)(Passwords|Environment)\sno' "{{ target_file }}"
      register: shell_check
      failed_when: shell_check.rc != 0

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: configure the SSH daemon to deny empty passwords login to the system 
      become: true
      lineinfile:
        path: "{{ target_file }}"
        line: PermitEmptyPasswords no
        regexp: '^#*\s*PermitEmptyPasswords.*'
        state: present
      register: set_empty_pw

    - name: configure the SSH daemon to deny unattended or automatic login to the system 
      become: true
      lineinfile:
        path: "{{ target_file }}"
        line: PermitUserEnvironment no
        regexp: '^#*\s*PermitUserEnvironment.*'
        state: present
      register: set_user_env

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: set_empty_pw.failed == false and set_user_env.failed == false

    - debug:
        var: stig_text

    - name: restart sshd.service
      become: true
      service:
        name: sshd
        state: restarted

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes