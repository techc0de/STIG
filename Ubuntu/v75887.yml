---

- set_fact:
    stig_id: V-75887
    stig_text: "FAILED. the OS is performing packet forwarding."

- local_action: lineinfile regexp='^V-75887' path="{{ output_path }}" state=absent

- name: verify the OS is not performing packet forwarding
  block:

    - name: check the value of the "default send_redirects" variables
      become: true
      shell: sysctl net.ipv4.ip_forward
      register: tcp_check
      failed_when: tcp_check.stdout.find('net.ipv4.ip_forward = 0') == -1
      
    - set_fact: 
        stig_text: "PASSED"

  rescue:

    - name: configure the os to not allow packet forwarding
      become: true
      shell: sysctl -w net.ipv4.ip_forward=0
      register: tcp_fix

    - name: update config file
      become: true
      lineinfile:
        path: /etc/sysctl.conf
        line: net.ipv4.ip_forward = 0
        create: no
        regexp: '^\#*\s*net.ipv4.ip_forward'
        state: present
      register: config_updated

    - set_fact: 
        stig_text: "PASSED"
      when: tcp_fix.rc == 0 and config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

- local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes