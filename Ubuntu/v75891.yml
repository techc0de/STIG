---

- set_fact:
    stig_id: V-75891
    target_file: /etc/postfix/main.cf
    stig_text: "FAILED. the OS is not configured to prevent unrestricted mail relaying."

- local_action: lineinfile regexp='^V-75891' path="{{ output_path }}" state=absent

- name: if postfix is not installed, this is Not Applicable.
  block: 

    - name: check for postfix package
      shell: dpkg -l | egrep '^ii\s+postfix\s+'
      register: package_check
      failed_when: package_check.rc != 1

    - set_fact:
        stig_text: "PASSED. Not applicable. Postfix not installed."

  rescue:

    - name: verify the OS is configured to prevent unrestricted mail relaying.
      block:

        - name: check for the file
          become: true
          stat:
            path: "{{ target_file }}"
          register: config_file
          failed_when: config_file.stat.exists == false

        - name: check for relay
          become: true
          shell: postconf -n smtpd_relay_restrictions | cut -d "=" -f2 | awk '{$1=$1};1'
          register: relay_check
          failed_when: relay_check.stdout.find("permit_mynetworks, permit_sasl_authenticated, reject") == -1

        - set_fact:
            stig_text: "PASSED"

      rescue:

        - name: updated relay config
          become: true
          shell:  postconf -e 'smtpd_relay_restrictions = permit_mynetworks, permit_sasl_authenticated, reject'
          register: update_config
          ignore_errors: true

        - set_fact:
            stig_text: "PASSED"
          when: update_config.rc != 0

        - debug:
            msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
