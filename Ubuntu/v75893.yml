---

- set_fact:
    stig_id: V-75893
    target_file: /etc/aliases
    stig_text: "FAILED. system administrators must have mail aliases to be notified of an audit processing failure."

- local_action: lineinfile regexp='^V-75893' path="{{ output_path }}" state=absent

- name: check for postfix package
  block: 

    - name: check for postfix package
      shell: dpkg -l | egrep '^ii\s+postfix\s+'
      register: package_check
      failed_when: package_check.rc != 1

    - set_fact:
        stig_text: "PASSED. Not applicable. Postfix not installed."

  rescue:

    - name: verify that the administrators are notified in the event of an audit processing failure.
      block:

        - name: check for the file
          become: true
          stat:
            path: "{{ target_file }}"
          register: alias_file
          failed_when: alias_file.stat.exists == False

        - name: check for admin alias
          become: true
          shell: >
            grep 'postmaster: *root$' "{{ target_file }}" | cut -d":" -f2 | awk '{$1=$1}1'
          register: alias_check
          failed_when: alias_check.stdout.find("root") == -1

        - set_fact:
            stig_text: "PASSED"

      rescue:

        - name: configure the OS to notify administrators in the event of an audit processing failure
          become: true
          lineinfile:
            path: "{{ target_file }}"
            line: 'postmaster: root'
            regexp: '^#*\s*postmaster:.*'
            state: present
          register: update_alias

        - set_fact:
            stig_text: "PASSED"
          when: update_alias.failed == false

        - debug:
            msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes