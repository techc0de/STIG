---

- set_fact:
    stig_id: V-75899
    stig_text: "FAILED. TFTP daemon is not configured to operate in secure mode"

- local_action: lineinfile regexp='^V-75899' path="{{ output_path }}" state=absent

- name: verfiy that the TFTP daemon package is configured to operate in secure mode.
  block:

    - shell: dpkg -l | egrep '^ii\s+tftp\-hpa\s+'
      register: package_check
      failed_when: package_check.rc != 1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove the tftp-hpa package
      become: true
      apt:
        name: tftp-hpa
        state: absent
      register: remove_package

    - set_fact:
        stig_text: "PASSED"
      when: remove_package.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

