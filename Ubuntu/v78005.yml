---

- set_fact:
    stig_id: V-78005

- local_action: lineinfile regexp='^V-78005' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. DoD-approved virus scan program not found"

- name: verify the system is using a DoD-approved virus scan program.
  block: 

    - shell: "dpkg -l | grep clamav"
      register: clam_check

    - command: /bin/false
      when: clam_check.stdout.find('ii  clamav-daemon') == -1

    - shell: systemctl status clamav-daemon
      register: daemon_check
      failed_when: daemon_check.rc == 1

    - command: /bin/false
      when: daemon_check.stdout.find('active (running)') == -1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: install the clamav package
      become: true
      apt:
        name: 
          - clamav 
          - clamdscan 
          - clamav-daemon 
          - clamav-base 
          - clamav-freshclam 
          - libclamav7
        state: present
        update_cache: yes
        cache_valid_time: 3600
      register: install_clamav

    - name: start the agent
      become: true
      shell: systemctl start clamav-daemon
      when: install_clamav.failed == false

    - name: enable the agent
      become: true
      shell: systemctl enable clamav-daemon
      when: install_clamav.failed == false

    - shell: systemctl status clamav-daemon
      register: daemon_check
      failed_when: daemon_check.rc == 1
      when: install_clamav.failed == false

    - shell: systemctl status clamav-daemon
      register: daemon_check
      failed_when: daemon_check.rc == 1
      when: install_clamav.failed == false

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: daemon_check.stdout.find('active (running)') != -1
      
    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
