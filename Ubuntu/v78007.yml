---

- set_fact:
    stig_id: V-78007
    stig_text: "FAILED. outdated virus definition files found"

- local_action: lineinfile regexp='^V-78007' path="{{ output_path }}" state=absent

- name: verify the system is using a DoD-approved virus scan program and the virus definition file is less than seven days old.
  block: 

    - name: check for the presence of "McAfee VirusScan Enterprise for Linux"
      block:
        
        - shell: systemctl status nails
          register: mcafee_proc
          failed_when: mcafee_proc.rc != 0 or mcafee_proc.stdout.find('active (running)') == -1

        - shell: find /opt/NAI/LinuxShield/engine/dat -type f -name "*.dat"
          register: mcafee_files
          failed_when: mcafee_files.stdout == ""

        - shell: find /opt/NAI/LinuxShield/engine/dat -type f -mtime +7 -name "*.dat"
          register: mcafee_def
          failed_when: mcafee_def.stdout != ""

        - set_fact:
            stig_text: "PASSED"

      rescue:

        - shell: systemctl status clamav-daemon
          register: daemon_check
          failed_when: daemon_check.stdout.find('active (running)') == -1

        - shell: find /var/lib/clamav -type f \( -name '*.cvd' -o -name '*.cld' \)
          register:  clamav_files
          failed_when: clamav_files.rc == 3 
          
        - shell: find /var/lib/clamav -type f \( -name '*.cvd' -o -name '*.cld' \) -mtime +7
          register:  clamav_def
          failed_when: clamav_def.stdout != ""

        - set_fact:
            stig_text: "PASSED"

  rescue:

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
