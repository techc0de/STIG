---

- set_fact:
    stig_id: V-80961
    stig_text: 'FAILED. os does not notify the System Administrator (SA) when allocated audit record storage volume reaches 75% of the repository maximum audit record storage capacity'
    target_file: /etc/audit/auditd.conf

- local_action: lineinfile regexp='^V-80961' path="{{ output_path }}" state=absent

- name: verify the audit log files are owned by "root"
  block: 

    - name: check for the target file
      become: true
      stat:
        path: "{{ target_file }}"
      register: audit_file
      failed_when: audit_file.stat.exists == false

    - name: get path of audit log file
      become: true
      shell: grep -w '^log_file' "{{ target_file }}"
      register: log_file_param
      failed_when: log_file_param.stdout == ""

    - set_fact:
        log_file_path: "{{ log_file_param.stdout.split('=')[1]|trim }}"

    - name: calculate what 25% of the partition size is
      become: true
      shell: df | grep $(dirname "{{ log_file_path }}") | awk '{print $2*.25}'
      register: min_size
      failed_when: min_size.rc != 0 or min_size.stdout == "0" 

    - name: get space_left value
      become: true
      shell: grep -w '^space_left' "{{ target_file }}" | tr -s " " | cut -d "=" -f2 | bc
      register: space_left
      failed_when: space_left.stdout == ""

    - fail:
        msg: space_left param is not set to 25%
      when: space_left.stdout < min_size.stdout

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: set space left param
      become: true
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^\#*\s*space_left\s*\=.*'
        line: space_left = {{ min_size.stdout | int }}
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640
      register: config_updated

    - set_fact:
        stig_text: "PASSED"
      when: config_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

    - name: restart audit service 
      become: true
      shell: systemctl restart auditd.service
      ignore_errors: yes

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
