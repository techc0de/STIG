---

- set_fact:
    stig_id: Install Desktop Central Engine Agent
    stig_text: "FAILED. Ubuntu failed to install DC Engine Agent."
    file_src: /home/thuan/projects/ansible-stigs/tasks/stig/ubuntu/DCLinuxAgent

- local_action: lineinfile regexp='^dc-agent' path="{{ output_path }}" state=absent

- name: Check if DC Agent is installed.
  block:      
  
    - name: validating if the package is installed.
      stat:
        path: /usr/local/desktopcentralagent
      register: file_details 
      failed_when: file_details.stat.exists == False or file_details.stdout == ""


    - name: Ensure the folder is not empty.
      shell: |
          ls -la /usr/local/desktopcentralagent
      register: contents
      failed_when: contents.stdout_lines | length < 0 or contents.rc != 0
    
    - set_fact:
        stig_text: "DC Engine Agent is not installed."
        
    - set_fact:
        stig_text: "PASSED"
    
  rescue:

    - name: Download DC Engine agent from shared drive to local host.
      become: true
      fetch:
        src: "{{ file_src }}"
        dest: /tmp/
      register: downloads

    - name: Make DCLinuxAgent installer executable 
      become: true
      file:
        path: /tmp/DCLinuxAgent
        state: touch
        mode: u=rx,g=rx,o=rx
      register: permissions
      when: downloads.changed

    - name: Install DC Engine agent.
      become: true
      shell: | 
        ./DesktopCentral_LinuxAgent.bin
      args:
        chdir: /tmp/DCLinuxAgent
      when: permissions.changed
      register: installation

    - name: Verify the agent is installed.
      become: true
      stat:
        path: /usr/local/desktopcentralagent
      when: installation.changed
      register: agent_path 

    - set_fact:
        stig_text: "PASSED"
      when: 
        - installation.changed
        - agent_path.stat.exists

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







