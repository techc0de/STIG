---

- set_fact:
    stig_id: V-100527
    target_file: /proc/sys/crypto/fips_enabled
    stig_text: "FAILED. FIPS mode is not enabled"

- local_action: lineinfile regexp='^V-100527' path="{{ output_path }}" state=absent

- name: check auto-logout configuration
  block: 

    - stat:
        path: "{{ target_file }}"
      register: fips_file
      failed_when: fips_file.stat.exists == False

    - set_fact:
        contents: "{{ lookup('file', {{ target_file }}) }}"

    - fail:
        msg: "FIPS mode is not enabled"
      when: contents is not defined or contents.find("1") == -1 

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes