---

- set_fact:
    stig_id: V-100581
    stig_text: "FAILED. telnet package is installed"

- local_action: lineinfile regexp='^V-100581' path="{{ output_path }}" state=absent

- name: verfiy that the telnet package is not installed
  block:

    - shell: dpkg -l | egrep '^ii\s+telnetd\s+'
      register: telnet_check
      failed_when: telnet_check.rc != 1

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: remove the telnet package
      become: true
      apt:
        name: telnetd
        state: absent
      register: remove_telnet

    - set_fact:
        stig_text: "PASSED"
      when: remove_telnet.failed == false

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
