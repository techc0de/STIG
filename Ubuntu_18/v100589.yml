---

- set_fact:
    stig_id: V-100589

- local_action: lineinfile regexp='^V-100589' path="{{ output_path }}" state=absent

- stat:
    path: /etc/security/pwquality.conf
  register: pw_file

- name: check that password minimum length is greather than 14
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pw complexity file does not exist."
      when: pw_file.stat.exists == False

    - command: /bin/false
      when: pw_file.stat.exists == False

    - name: uncomment configuation option
      become: true
      lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^\#*\s*minlen.*'
        line: minlen=15
        state: present
        create: yes
        owner: root
        group: root

    - shell: grep '^minlen' /etc/security/pwquality.conf
      register: pw_check

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. pw minimum length rule is not set."
      when: pw_check.stdout.find('minlen=15') == -1

    - command: /bin/false
      when: pw_check.stdout.find('minlen=15') == -1
      
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: add minimum length requirement to password quality config file
      become: true
      lineinfile:
        path: /etc/security/pwquality.conf
        create: yes
        owner: root
        group: root
        state: present
        line: minlen=15
      register: config_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: config_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
