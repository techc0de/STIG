---

- set_fact:
    stig_id: V-219182
    stig_text: "Ubuntu 18 doesn't employ a FIPS 140-2 approved cryptographic algorithms for created and stored passwords."
    target_file: /etc/pam.d/common-password

- local_action: lineinfile regexp='^V-219182' path="{{ output_path }}" state=absent

- name: check that encrypted password is configured with sha512 algorithm
  block: 
    - name: check for the file existence
      stat:
        path: "{{ target_file }}"
      register: pam_file
      
    - set_fact:
        stig_text: "FAILED. {{ target_file }} file does not exist."
      when: pam_file.stat.exists == False

    - shell: grep ^password /etc/pam.d/common-password | grep pam_unix.so | grep -i sha512 | wc -l
      become: true
      register: pam_check

    - command: /bin/false
      when: pam_check.stdout == "0"

    - shell: grep -i ENCRYPT_METHOD /etc/login.defs | grep -i sha512 | wc -l
      become: true
      register: encryption_check

    - command: /bin/false
      when: encryption_check.stdout == "0"

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. SHA512 encryption option is not set in the /etc/pam.d/common-password file."

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: Configure Password Encryption
      become: true
      lineinfile:
        path: /etc/pam.d/common-password
        create: no
        state: present
        regexp: '^(password.*pam_unix.so)\s*(obscure*)\s*(.*)$'
        line: '\1 \2 sha512'
        backrefs: yes
      register: pam_updated
      
   
    - name: Configure Encryption Method
      become: true
      lineinfile:
        path: /etc/login.defs
        create: no
        state: present
        regexp: 'ENCRYPT_METHOD\s*(.*)$'
        line: 'ENCRYPT_METHOD SHA512'
        backrefs: yes
      register: encryption_updated
      
    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: pam_updated.changed == true or encryption_updated.changed == true

    - debug:
        var: stig_text

  always:
    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
