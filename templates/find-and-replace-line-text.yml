---

- set_fact:
    stig_id: V-75463

- local_action: lineinfile regexp='^V-75463' path="{{ output_path }}" state=absent

- stat:
    path: /etc/pam.d/common-password
  register: pw_file

- name: ensure that encryption is configure to cypher for 5000 rounds
  block: 

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. common password file does not exist."
      when: pw_file.stat.exists == False

    - command: /bin/false
      when: pw_file.stat.exists == False

    - shell: grep ^password /etc/pam.d/common-password | grep '\s*rounds\s*\=*\s*[0-9]*\s*'
      register: rounds_check
      failed_when: rounds_check.rc == 2 or rounds_check.rc == 3

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. runds option is not set in the /etc/pam.d/common-password file"
      when: rounds_check.rc == 1

    - command: /bin/false
      when: rounds_check.rc == 1

    - set_fact:
        rounds_num:  "{{ rounds_check.stdout | regex_search('rounds\\s*\\=\\s*[0-9]+') }}"

    - name: update param to cypher passwords for a min of 5000 rounds.
      become: true
      lineinfile:
        path: /etc/pam.d/common-password
        regexp: '^(password.*pam_unix.so.*)(\s*rounds\s*\=*\s*[0-9]*\s*)(.*)$'
        line: '\1rounds=5000\3'
        backrefs: yes
      register: rounds_updated
      when: rounds_num.split('=')[1] | default('0') | int < 5000

    - set_fact:
        stig_text: "{{ stig_id }} FAILED. remember option is not set in the /etc/pam.d/common-password file"
      when: rounds_updated.failed is defined and rounds_updated.failed == true
      
    - command: /bin/false
      when: rounds_updated.failed is defined and rounds_updated.failed == true

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: add param to cypher passwords for a min of 5000 rounds.
      become: true
      lineinfile:
        path: /etc/pam.d/common-password
        create: no
        state: present
        regexp: '^(password.*pam_unix.so.*)$'
        line: '\1 rounds=5000'
        backrefs: yes
      register: rounds_updated

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: rounds_updated.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes
