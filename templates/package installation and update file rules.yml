---

- set_fact:
    stig_id: V-219316
    stig_text: "FAILED. Ubuntu doesn't map the authenticated identity to the user or group account for PKI-based authentication. "
    target_file: /etc/pam_pkcs11/pam_pkcs11.conf

- local_action: lineinfile regexp='^V-219316' path="{{ output_path }}" state=absent

- name: Ensure libpam-pkcs11 package is installed.
  block: 

    - name: check for libpam-pkcs11 package
      shell: dpkg -l | egrep '^ii  libpam-pkcs11'
      register: package_check
      failed_when: package_check.rc != 0

    - name: Check if use_mappers is set to pwent in "{{ target_file }}"
      shell: grep use_mappers "{{ target_file }}"
      register: mappers_check
      failed_when: mappers_check.rc != 0 or mappers_check.stdout != 'use_mappers = pwent'
    
    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: Install libpam-pkcs11 if it isn't installed.    
      become: true
      apt:
        name: libpam-pkcs11
        state: present
      register: install_pkg

    - name: remove any existing "use_mappers" rules from audit file      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)use_mappers(.*)$'
        state: absent
        create: yes
        backup: yes

    - name: add/update the audit rules for 'use_mappers'.
      lineinfile:
        path: "{{ target_file }}"
        line: use_mappers = pwent
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated 
    
    - set_fact:
        stig_text: "PASSED"
      when: install_pkg.failed == false or file_updated.failed == false

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes



