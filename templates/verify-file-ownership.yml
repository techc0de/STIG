---

- set_fact:
    stig_id: V-75601
    stig_text: 'FAILED. the /var/log/syslog file is not owned by syslog.'
    target_file: /var/log/syslog

- local_action: lineinfile regexp='^V-75601' path="{{ output_path }}" state=absent

- name: verify that the /var/log/syslog file is owned by syslog.
  block: 

    - shell: ls -la "{{ target_file }}" | cut -d' ' -f3
      register: file_owner
      failed_when: file_owner.rc != 0 or file_owner.stdout != 'syslog'

    - set_fact:
        stig_text: "PASSED"

  rescue:

    - name: change the owner of the file /var/log/syslog to syslog
      become: true
      file:
        path: "{{ target_file }}"
        owner: syslog
        group: root
        state: touch
      register: file_perms

    - set_fact:
        stig_text: "PASSED"
      when: file_perms.changed == true

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:

    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes