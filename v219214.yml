---

- set_fact:
    stig_id: V-219214
    stig_text: "FAILED. Ubuntu does not generate audit records for the use and modification of the faillog file."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219214' path="{{ output_path }}" state=absent

- name: check for stig.rules file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False

    - name: check for audit rules
      shell: auditctl -l | grep faillog
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('-w /var/log/faillog -p wa -k logins') != -1
        msg: Audit Rules Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: remove any existing "faillog" rules from audit file      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)faillog(.*)$'
        state: absent
        create: yes
        backup: yes

    - name: add/update "faillog" rules to stig.rules file.
      lineinfile:
        path: "{{ target_file }}"
        line: |
          -w /var/log/faillog -p wa -k logins        
        state: present
        create: no
        owner: root
        group: root
        mode: 0640 
      register: file_updated
  
    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes
