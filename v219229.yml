---

- set_fact:
    stig_id: V-219229
    stig_text: "FAILED. Ubuntu isn't configured to be permit only authorized accounts ownership of the audit log files."

- local_action: lineinfile regexp='^V-219229' path="{{ output_path }}" state=absent

- name: Ubuntu must permit only authorized accounts ownership of the audit log files.
  block: 
    - name: Check the audit logs location.
      become: true
      shell: grep -iw log_file /etc/audit/auditd.conf | awk '{print $3}'
      register: logs_path

    - name: Verify the permissions of audit logs.
      become: true
      shell: stat -c "%n %U" /var/log/audit/* | awk '{print $2}'
      register: result
      failed_when: result.stdout != 'root'
   
    - set_fact:
        stig_text: "PASSED"
    
  rescue:

    - name: change the audit logs' ownership to rool and/or create audit direcotry if it doesn't exist.
      become: true
      file:
        path: /var/log/audit/
        owner: root
        state: directory
        recurse: yes
      register: file_perms_rule 
  
    - set_fact:
        stig_text: "PASSED"
      when: file_perms_rule.changed

    - debug:
        msg: "{{ stig_id }} {{ stig_text }}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes







