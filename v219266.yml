---

- set_fact:
    stig_id: V-219266
    stig_text: "FAILED. Ubuntu does not generate audit record when attempts to use newgrp command."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219266' path="{{ output_path }}" state=absent

- name: Check for audit config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      become: true
      shell: auditctl -l | grep newgrp
      register: audit_check
      failed_when: audit_check.rc != 0

    - assert:
        that: 
          - audit_check.stdout.find('-a always,exit -F path=/usr/bin/newgrp -F perm=x -F auid>=1000 -F auid!=-1 -k priv_cmd') != -1
        msg: Audit Rules Not Configured

    - set_fact:
        stig_text: "PASSED"

  rescue:
    - name: remove any existing "newgrp" rules from audit file      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)newgrp(.*)$'
        state: absent
        create: yes
        backup: no

    - name: configure the audit system to generate an audit event for any successful/unsuccessful use of the "newgrp" command.
      lineinfile:
        path: "{{ target_file }}"
        line: -a always,exit -F path=/usr/bin/newgrp -F perm=x -F auid>=1000 -F auid!=4294967295 -k priv_cmd
        state: present
        create: yes
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      become: true
      shell: augenrules --load
      ignore_errors: true
      register: reload_rules    

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

