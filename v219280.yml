---

- set_fact:
    stig_id: V-219280
    stig_text: "FAILED. Ubuntu does not generate audit records for successful/unsuccessful uses of the delete_module syscall."
    target_file: /etc/audit/rules.d/stig.rules

- local_action: lineinfile regexp='^V-219280' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: auditctl -l | grep -w delete_module
      register: audit_check
      failed_when: audit_check.rc != 0 or audit_check.stdout_lines.find(#) != -1

    - assert:
        that: 
          - audit_check.stdout.find('-a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=-1 -k module_chng') != -1
        fail_msg: Audit Rules Not Configured

    - fail:
        msg: "FAILED. {{ target_file }} file does not exist."
      when: rules_file.stat.exists == False


  rescue:
    - name: remove any existing "delete module" rules from audit file      
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^(.*)delete_module(.*)$'
        state: absent
        create: yes

    - name: Configure the audit system to generate an audit event for any successful/unsuccessful use of the "delete_module" syscall.
      lineinfile:
        path: "{{ target_file }}"
        line: |
          -a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=4294967295 -k module_chng
        state: present
        create: no
        owner: root
        group: root
        mode: 0640 
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false

    - name: reload the rules file
      shell: augenrules --load
      register: reload_rules

    - debug:
        msg: "{{ stig_id }} {{stig_text}}"

  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

