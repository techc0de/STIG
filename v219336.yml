---

- set_fact:
    stig_id: V-219336
    stig_text: "FAILED. Ubuntu does not use cryptographic mechanisms to protect the integrity of audit tools."
    target_file: /etc/aide/aide.conf

- local_action: lineinfile regexp='^V-219336' path="{{ output_path }}" state=absent

- name: Check for stig.rules config file existence
  block: 
    - name: check for the file
      stat:
        path: "{{ target_file }}"
      register: rules_file

    - name: check for audit rules
      shell: egrep '(\/sbin\/(audit|au))' {{ target_file }}
      register: audit_check
      failed_when: audit_check.rc != 0 or audit_check.stdout_lines | length < 7

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: remove existing rules
      become: true
      lineinfile:
        path: "{{ target_file }}"
        regexp: '^\/sbin\/(audit|au)'
        state: absent
   
    - name: configure the "/etc/aide/aide.conf" to protect the integrity of the audit tools.
      lineinfile:
        path: "{{ target_file }}"
        line: |
          # Audit Tools
          /sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512
          /sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
          /sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512
          /sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
          /sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
          /sbin/audispd p+i+n+u+g+s+b+acl+xattrs+sha512
          /sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512
        state: present
        owner: root
        group: root
        create: no
      register: file_updated

    - set_fact:
        stig_text: "PASSED"
      when: file_updated.failed == false
      
  always:
    - local_action: lineinfile line="{{ stig_id }} {{ stig_text }}" path="{{ output_path }}" create=yes

