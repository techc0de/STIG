---

- set_fact:
    stig_id: V-75895

- local_action: lineinfile regexp='^V-75895' path="{{ output_path }}" state=absent

- set_fact:
    stig_text: "{{ stig_id }} FAILED. vsftpd package is installed"

- name: verfiy that the vsftpd package is not installed
  block:

    - shell: dpkg -l | egrep '^ii\s+vsftpd\s+'
      register: package_check
      failed_when: package_check.rc != 1

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"

  rescue:

    - name: remove the vsftpd package
      become: true
      apt:
        name: vsftpd
        state: absent
      register: remove_package

    - set_fact:
        stig_text: "{{ stig_id }} PASSED"
      when: remove_package.failed == false

    - debug:
        var: stig_text

  always:

    - local_action: lineinfile line="{{ stig_text }}" path="{{ output_path }}" create=yes

